<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MorphDB — live todo (two tabs, live)</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 16px/1.5 system-ui, sans-serif; max-width: 560px; margin: 40px auto;
         padding: 0 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #888; font-size: 13px; margin: 0 0 20px; }
  .status { font-size: 12px; padding: 3px 8px; border-radius: 100px;
            border: 1px solid currentColor; display: inline-block; }
  .status.live { color: #1a9e5b; }
  .status.poll { color: #b8860b; }
  .status.down { color: #c0392b; }
  form { display: flex; gap: 8px; margin: 16px 0; }
  input[type=text] { flex: 1; padding: 8px 10px; font-size: 15px; }
  button { padding: 8px 14px; font-size: 15px; cursor: pointer; }
  ul { list-style: none; padding: 0; }
  li { display: flex; align-items: center; gap: 10px; padding: 8px 4px;
       border-bottom: 1px solid #8884; }
  li.done label { text-decoration: line-through; color: #999; }
  li label { flex: 1; }
  li .del { border: none; background: none; color: #c0392b; font-size: 18px; }
  .empty { color: #999; padding: 20px 4px; }
</style>
</head>
<body>
  <h1>Live todo <span id="status" class="status">connecting…</span></h1>
  <p class="sub">Open this page in two tabs. A change in one appears in the other
  with no refresh — that's <code>watch()</code> over the stream. Needs a local
  MorphDB: <code>morphdb start</code>.</p>

  <form id="add">
    <input type="text" id="title" placeholder="what needs doing?" autocomplete="off">
    <button type="submit">Add</button>
  </form>

  <ul id="list"></ul>

  <script src="./morphdb-stream.js"></script>
  <script>
    const BASE = location.origin.startsWith("http") ? location.origin
                                                    : "http://127.0.0.1:8787";
    const APP = "live-todo-demo";
    const db = MorphDBStream(BASE, APP);
    const statusEl = document.getElementById("status");

    function setStatus(kind, text) {
      statusEl.className = "status " + kind;
      statusEl.textContent = text;
    }

    async function api(method, path, body) {
      const r = await fetch(BASE + path, {
        method,
        headers: { "Content-Type": "application/json", "X-App-Key": APP },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!r.ok && r.status !== 409) throw await r.json();
      return r.status === 204 ? null : r.json();
    }

    // One-time provisioning: register the app + a todo type (idempotent).
    async function provision() {
      await fetch(BASE + "/app", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: APP }),
      });
      await api("PUT", "/schema/todo", {
        fields: {
          title: { type: "string" },
          done: { type: "boolean", index: true, default: false },
          created: { type: "datetime", index: true },
        },
        merge: true,
      });
    }

    function render(objects) {
      const list = document.getElementById("list");
      if (!objects.length) {
        list.innerHTML = '<li class="empty">Nothing yet — add a todo above.</li>';
        return;
      }
      list.innerHTML = "";
      objects.forEach((t) => {
        const li = document.createElement("li");
        if (t.done) li.className = "done";
        const cb = document.createElement("input");
        cb.type = "checkbox"; cb.checked = !!t.done;
        cb.onchange = () => api("PATCH", "/objects/todo/" + t._guid,
                                { done: cb.checked });
        const label = document.createElement("label");
        label.textContent = t.title;
        const del = document.createElement("button");
        del.className = "del"; del.textContent = "×"; del.title = "delete";
        del.onclick = () => api("DELETE", "/objects/todo/" + t._guid);
        li.append(cb, label, del);
        list.appendChild(li);
      });
    }

    document.getElementById("add").onsubmit = async (e) => {
      e.preventDefault();
      const input = document.getElementById("title");
      const title = input.value.trim();
      if (!title) return;
      input.value = "";
      await api("POST", "/objects/todo",
                { title, done: false, created: new Date().toISOString() });
    };

    provision().then(() => {
      // Whole result, newest first — no limit, so the transport shows the same
      // set whether it streams (delta) or polls.
      const cb = (payload) => {
        setStatus("live", payload.initial ? "live" : "live ·");
        render(payload.objects);
      };
      cb.onError = (err) => setStatus("down", "error: " + (err.message || err.code));
      db.watch("todo", { sort: "created", order: "desc" }, cb);
    }).catch((err) => setStatus("down", "setup failed: " + (err.message || err)));
  </script>
</body>
</html>
