<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MorphDB · Shaper — a Figma-style example</title>
<!-- inline SVG favicon (the Shaper mark) — avoids a /favicon.ico 404 on every load -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='9' height='9' rx='2.5' fill='%231abcfe'/%3E%3Cpath d='M17.5 2 L22 11 H13 Z' fill='%23a259ff'/%3E%3Ccircle cx='6.5' cy='17.5' r='4.5' fill='%23ff7262'/%3E%3Crect x='13' y='13' width='9' height='9' rx='2.5' fill='%230acf83'/%3E%3C/svg%3E" />
<style>
  :root {
    color-scheme: light dark;
    --chrome:   #2c2c2c;   /* panel / toolbar surface */
    --chrome-2: #1e1e1e;   /* header */
    --field:    #383838;   /* inputs inside dark panels */
    --line:     #ffffff1f; /* hairline on dark */
    --ink:      #e9e9ea;   /* primary text on chrome */
    --muted:    #9b9b9d;   /* secondary text on chrome */
    --accent:   #0d99ff;   /* blue accent — selection & active tool */
    --canvas:   #f1f1f4;   /* the design surface */
    --dot:      #00000016;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 13px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--chrome-2);
    color: var(--ink);
    overflow: hidden;
  }
  #app {
    height: 100vh;
    display: grid;
    grid-template:
      "header header"  44px
      "canvas inspect" 1fr
      / 1fr 264px;
  }

  /* ---- header ---------------------------------------------------------- */
  header {
    grid-area: header;
    background: var(--chrome-2);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px;
  }
  .logo { display: flex; }
  .brand { font-weight: 600; letter-spacing: .2px; }
  .sep { width: 1px; height: 18px; background: var(--line); }
  #docName {
    background: transparent; border: 1px solid transparent; color: var(--ink);
    font: inherit; font-weight: 500; padding: 4px 8px; border-radius: 6px;
    min-width: 80px; max-width: 280px;
  }
  #docName:hover { border-color: var(--line); }
  #docName:focus { outline: none; border-color: var(--accent); background: var(--field); }
  .spacer { flex: 1; }
  .histbtns { display: inline-flex; gap: 2px; }
  .hbtn {
    width: 28px; height: 26px; border: none; background: transparent; color: var(--ink);
    border-radius: 6px; cursor: pointer; font-size: 15px; line-height: 1;
  }
  .hbtn:hover:not(:disabled) { background: #ffffff14; }
  .hbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .hbtn:disabled { opacity: .35; cursor: default; }
  .status {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 12px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #2bd66a; }
  .status.err-state .dot { background: #ff5c5c; }
  #err { color: #ff8a8a; font-size: 12px; max-width: 360px;
         overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- canvas ---------------------------------------------------------- */
  #stage { grid-area: canvas; position: relative; overflow: hidden; }
  #canvas {
    position: absolute; inset: 0;
    background:
      radial-gradient(var(--dot) 1px, transparent 1px);
    background-size: 22px 22px;
    background-color: var(--canvas);
    cursor: default;
  }
  #canvas.draw { cursor: crosshair; }
  /* #scene holds all shapes + selection frames and is what zoom/pan transforms */
  #scene { position: absolute; inset: 0; transform-origin: 0 0; }
  .shape {
    position: absolute; user-select: none;
    color: #fff; /* default text color overwritten per-shape */
  }
  .shape:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .shape.rect    { border-radius: 4px; box-shadow: 0 1px 2px #0000001f; cursor: move; }
  .shape.ellipse { border-radius: 50%; box-shadow: 0 1px 2px #0000001f; cursor: move; }
  .shape.line    { background: transparent !important; cursor: move; }
  .shape.line svg { width: 100%; height: 100%; display: block; overflow: visible; pointer-events: none; }
  .shape.text {
    background: transparent; cursor: move; font-weight: 600; font-size: 22px;
    line-height: 1.2; padding: 2px 4px; white-space: pre-wrap; word-break: break-word;
    overflow: visible; display: block;
  }
  .shape.text[contenteditable="true"] {
    cursor: text; outline: 2px solid var(--accent); border-radius: 3px; background: #ffffff66;
  }
  .shape.preview { opacity: .65; pointer-events: none; outline: 1.5px dashed var(--accent); }
  /* selection frame(s) — one per selected shape; handles only when exactly one */
  .selframe { position: absolute; pointer-events: none; border: 1.5px solid var(--accent); border-radius: 2px; }
  .selframe .h {
    position: absolute; width: 8px; height: 8px; background: #fff;
    border: 1.5px solid var(--accent); border-radius: 2px;
    pointer-events: auto;   /* handles are interactive even though the frame isn't */
  }
  .selframe .nw { left: -5px; top: -5px; }   .selframe .ne { right: -5px; top: -5px; }
  .selframe .sw { left: -5px; bottom: -5px; } .selframe .se { right: -5px; bottom: -5px; }
  .selframe .nw, .selframe .se { cursor: nwse-resize; }
  .selframe .ne, .selframe .sw { cursor: nesw-resize; }
  .marquee { position: absolute; border: 1px solid var(--accent); background: #0d99ff22; pointer-events: none; }
  /* multi-select: each member gets a thin outline; one union "group" frame carries the handles */
  .selframe.member { border-width: 1px; border-color: #0d99ff80; }
  .selframe.groupframe { border-color: var(--accent); }

  .empty {
    position: absolute; inset: 0; display: grid; place-content: center;
    text-align: center; color: #6b6b73; pointer-events: none; gap: 6px;
  }
  .empty b { color: #5a5a62; font-size: 15px; }

  /* zoom control (bottom-left) */
  #zoom {
    position: absolute; left: 14px; bottom: 18px; z-index: 10;
    display: flex; align-items: center; gap: 2px;
    background: var(--chrome); border: 1px solid var(--line);
    padding: 4px; border-radius: 10px; box-shadow: 0 8px 24px #00000040;
  }
  #zoom button {
    width: 26px; height: 26px; border: none; background: transparent; color: var(--ink);
    border-radius: 6px; cursor: pointer; font: inherit;
  }
  #zoom button:hover { background: #ffffff14; }
  #zoom #zoomVal { min-width: 48px; text-align: center; color: var(--muted); font-size: 12px; cursor: pointer; }

  /* floating toolbar (Figma-style bottom pill) */
  #toolbar {
    position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
    background: var(--chrome); border: 1px solid var(--line);
    padding: 6px; border-radius: 12px;
    box-shadow: 0 8px 24px #00000040;
  }
  .tool {
    width: 36px; height: 36px; display: grid; place-content: center;
    border: none; background: transparent; color: var(--ink);
    border-radius: 8px; cursor: pointer;
  }
  .tool:hover { background: #ffffff14; }
  .tool:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .tool.active { background: var(--accent); color: #fff; }
  .tbsep { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
  .swatch-btn {
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer; padding: 4px;
    border: none; background: transparent;
  }
  .swatch-btn .chip {
    width: 100%; height: 100%; border-radius: 6px; border: 1.5px solid #ffffff3a;
    display: block;
  }
  .swatch-btn:hover { background: #ffffff14; }

  /* ---- inspector ------------------------------------------------------- */
  #inspect {
    grid-area: inspect; background: var(--chrome);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .scroll { overflow-y: auto; flex: 1; }
  .sect { padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .sect h3 {
    margin: 0 0 10px; font-size: 11px; font-weight: 600; letter-spacing: .6px;
    text-transform: uppercase; color: var(--muted);
  }
  .row { display: flex; gap: 8px; }
  .field {
    display: flex; align-items: center; gap: 6px; flex: 1;
    background: var(--field); border: 1px solid transparent;
    border-radius: 6px; padding: 5px 8px;
  }
  .field:focus-within { border-color: var(--accent); }
  .field label { color: var(--muted); font-size: 11px; }
  .field input {
    width: 100%; background: transparent; border: none; color: var(--ink);
    font: inherit; outline: none; min-width: 0;
  }
  .mt8 { margin-top: 8px; }
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .sw {
    aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 1.5px solid #ffffff24;
  }
  .sw.active { box-shadow: 0 0 0 2px var(--chrome), 0 0 0 3.5px var(--accent); }
  .fillrow { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .fillrow input[type=color] {
    width: 30px; height: 30px; padding: 0; border: none; background: none; cursor: pointer;
  }
  .fillrow .hex {
    flex: 1; background: var(--field); border: 1px solid transparent; border-radius: 6px;
    color: var(--ink); font: inherit; padding: 6px 8px; text-transform: uppercase;
  }
  .fillrow .hex:focus { outline: none; border-color: var(--accent); }
  .fillrow .hex.invalid { border-color: #ff5c5c; }
  /* inline (field-local) hex validation message — never touches the global sync status */
  .hexnote { display: none; color: #ff8a8a; font-size: 11px; margin-top: 6px; }
  textarea#tx {
    width: 100%; resize: vertical; min-height: 56px; background: var(--field);
    border: 1px solid transparent; border-radius: 6px; color: var(--ink);
    font: inherit; padding: 6px 8px;
  }
  textarea#tx:focus { outline: none; border-color: var(--accent); }
  .btn {
    flex: 1; padding: 7px 10px; border: 1px solid var(--line); background: #ffffff10;
    color: var(--ink); border-radius: 7px; cursor: pointer; font: inherit;
  }
  .btn:hover { background: #ffffff1c; }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn.danger { color: #ff8a8a; border-color: #ff8a8a3a; }
  .btn.danger:hover { background: #ff5c5c1f; }

  .hint { color: var(--muted); padding: 16px 14px; line-height: 1.6; }
  .kbd {
    font: 11px/1 ui-monospace, Menlo, monospace; background: var(--field);
    border: 1px solid var(--line); border-radius: 4px; padding: 2px 5px; color: var(--ink);
  }

  /* layers list */
  .layer {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; color: var(--ink);
  }
  .layer:hover { background: #ffffff10; }
  .layer:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .layer.active { background: var(--accent); color: #fff; }
  .layer .ic { width: 14px; height: 14px; display: grid; place-content: center; opacity: .8; }
  .layer .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; outline: none; }
  .layer .nm[contenteditable="true"] { background: #ffffff22; border-radius: 3px; padding: 0 3px; cursor: text; }
  .layer .sw-mini { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #ffffff30; }
  .layer .step {
    width: 18px; height: 18px; display: grid; place-content: center; border: none;
    background: transparent; color: inherit; opacity: .65; border-radius: 4px; cursor: pointer;
    font-size: 9px; line-height: 1;
  }
  .layer .step:hover { background: #ffffff22; opacity: 1; }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* banner for an un-provisioned backend */
  #banner {
    position: absolute; left: 50%; top: 16px; transform: translateX(-50%);
    background: #3a2a12; color: #ffd9a8; border: 1px solid #ffb35c55;
    padding: 10px 14px; border-radius: 10px; max-width: 560px; display: none; z-index: 50;
    box-shadow: 0 8px 24px #00000050;
  }
  #banner code { background: #00000040; padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo" title="MorphDB Shaper">
      <!-- original 'Shaper' mark: a 2x2 cluster of design primitives, blue + multicolor accents -->
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="2" width="9" height="9" rx="2.5" fill="#1abcfe"/>     <!-- square, blue accent -->
        <path d="M17.5 2 L22 11 H13 Z" fill="#a259ff"/>                      <!-- triangle, purple accent -->
        <circle cx="6.5" cy="17.5" r="4.5" fill="#ff7262"/>                  <!-- circle, coral accent -->
        <rect x="13" y="13" width="9" height="9" rx="2.5" fill="#0acf83"/>   <!-- square, green accent -->
      </svg>
    </span>
    <span class="brand">MorphDB&nbsp;Shaper</span>
    <span class="sep"></span>
    <label for="docName" class="sr-only">Document name</label>
    <input id="docName" value="Untitled" spellcheck="false" aria-label="Document name" />
    <span class="sep"></span>
    <span class="histbtns" role="group" aria-label="History">
      <button id="undoBtn" class="hbtn" title="Undo (⌘Z)" aria-label="Undo" disabled>↶</button>
      <button id="redoBtn" class="hbtn" title="Redo (⌘⇧Z)" aria-label="Redo" disabled>↷</button>
    </span>
    <span class="spacer"></span>
    <span id="err" role="status" aria-live="polite"></span>
    <span class="status" id="status"><span class="dot"></span><span id="statusText">synced to MorphDB</span></span>
  </header>

  <div id="stage">
    <div id="canvas"><div id="scene"></div></div>
    <div id="banner"></div>

    <div id="zoom" role="group" aria-label="Zoom controls">
      <button id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
      <span id="zoomVal" title="Reset to 100%">100%</span>
      <button id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
      <button id="zoomFit" title="Zoom to fit (Shift+1)" aria-label="Zoom to fit">Fit</button>
    </div>

    <div id="toolbar">
      <button class="tool active" data-tool="select" title="Move (V)" aria-label="Move tool" aria-pressed="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 8.5-6.2 1.4L9.9 19 5 3z"/></svg>
      </button>
      <button class="tool" data-tool="rect" title="Rectangle (R)" aria-label="Rectangle tool" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="5.5" width="16" height="13" rx="1.5"/></svg>
      </button>
      <button class="tool" data-tool="ellipse" title="Ellipse (O)" aria-label="Ellipse tool" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>
      </button>
      <button class="tool" data-tool="text" title="Text (T)" aria-label="Text tool" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6h12M12 6v12M9.5 18h5"/></svg>
      </button>
      <button class="tool" data-tool="line" title="Line (L)" aria-label="Line tool" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 19 19 5"/></svg>
      </button>
      <span class="tbsep"></span>
      <button class="swatch-btn" id="drawFillBtn" title="Fill for new shapes" aria-label="Fill color for new shapes">
        <span class="chip" id="drawFillChip"></span>
      </button>
    </div>
  </div>

  <aside id="inspect">
    <div class="scroll" id="inspectBody"></div>
  </aside>
</div>

<script>
const BASE = location.hostname
  ? `${location.protocol}//${location.hostname}:8787`
  : "http://127.0.0.1:8787";
const APP = "figma-demo";            // this site's MorphDB app key (sent as X-App-Key)

const $  = (id) => document.getElementById(id);
const PALETTE = ["#4c6ef5","#f783ac","#38d9a9","#ffd43b","#ff922b","#845ef7","#212529","#ffffff"];

let docGuid = null;
let shapes  = [];                    // kept sorted by z ascending (paint order)
let sel     = new Set();             // selected shape guids (multi-select)
let tool    = "select";              // select | rect | ellipse | text | line
let drawFill = "#4c6ef5";            // fill applied to newly drawn shapes
let view    = { scale: 1, tx: 0, ty: 0 };   // zoom + pan of the scene
let busy    = false;                 // guards undo/redo reconcile from overlap

/* ------- generic MorphDB client — these endpoints never change ---------- */
async function api(method, path, body) {
  const res = await fetch(BASE + path, {
    method,
    headers: { "Content-Type": "application/json", "X-App-Key": APP },
    body: body === undefined ? undefined : JSON.stringify(body),
  });
  const data = res.status === 204 ? null : await res.json();
  if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
  return data;
}

function setErr(m) {
  $("err").textContent = m || "";
  $("status").classList.toggle("err-state", !!m);
  $("statusText").textContent = m ? "error" : "synced to MorphDB";
}
function showBanner(html) { const b = $("banner"); b.innerHTML = html; b.style.display = "block"; }

/* ------- self-bootstrap: the in-browser equivalent of `morphdb init` ----- */
async function bootstrap() {
  // 1) ensure this app exists. Probe with an authenticated GET first (200 if the
  //    app is registered, 404 "unknown app" if not) and only POST /app when it's
  //    genuinely missing — so a normal reload never logs a red 409 in the console.
  let appExists = false;
  try {
    await api("GET", "/schema");
    appExists = true;
  } catch (e) {
    // a 404 means we should register; any other error (e.g. backend down) is left
    // for the first real call below to surface.
    appExists = !/unknown app/i.test(e.message) ? null : false;
  }
  if (appExists === false) {
    try {
      await fetch(BASE + "/app", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key: APP }),
      });
    } catch (_) { /* connection errors surface on the first real call */ }
  }

  // 2) apply the shipped schema file — fields for every type first, then
  //    relations (so a relation's target type already exists). If the page is
  //    opened from file://, the fetch fails; we assume `morphdb init` already ran.
  try {
    const res = await fetch("./morphdb.schema.json");
    if (!res.ok) return;
    const doc = await res.json();
    const types = doc.types || [];
    for (const t of types)
      await api("PUT", `/schema/${t.name}`, { merge: true, fields: t.fields || {} });
    for (const t of types)
      if (t.relations && Object.keys(t.relations).length)
        await api("PUT", `/schema/${t.name}`, { merge: true, relations: t.relations });
  } catch (_) { /* file:// — assume the schema was applied out of band */ }
}

/* ------- load (or seed) the one document and its shapes ------------------ */
async function loadOrSeed() {
  const probe = await api("GET", "/objects/doc?limit=1");
  if (probe.total === 0) {
    const d = await api("POST", "/objects/doc", { name: "Welcome to MorphDB" });
    docGuid = d._guid;
    // a few overlapping shapes of different kinds & colors
    const seed = [
      { kind: "rect",    x: 220, y: 150, w: 260, h: 180, fill: "#4c6ef5", text: "", z: 1 },
      { kind: "ellipse", x: 360, y: 230, w: 220, h: 220, fill: "#f783ac", text: "", z: 2 },
      { kind: "rect",    x: 300, y: 320, w: 180, h: 120, fill: "#38d9a9", text: "", z: 3 },
      { kind: "text",    x: 250, y: 190, w: 280, h: 56,  fill: "#ffffff", text: "Design, persisted.", z: 4 },
    ];
    for (const s of seed) await api("POST", "/objects/shape", { ...s, doc: docGuid });
  } else {
    docGuid = probe.objects[0]._guid;
  }
  $("docName").value = (probe.total ? probe.objects[0].name : "Welcome to MorphDB");
  await loadShapes();
}

async function loadShapes() {
  // filter by the doc relation; sort by the indexed z field (paint order)
  const { objects } = await api(
    "GET", `/objects/shape?doc=${docGuid}&sort=z&order=asc&limit=500`);
  shapes = objects;
  render();
}

/* ------- rendering ------------------------------------------------------ */
const KIND_ICON = {
  rect:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="4" y="5.5" width="16" height="13" rx="1.5"/></svg>',
  ellipse: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="8"/></svg>',
  text:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6h12M12 6v12"/></svg>',
  line:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M5 19 19 5"/></svg>',
};

/* a line shape spans its bounding box along one of the two diagonals; the box
   scales the SVG (preserveAspectRatio=none) and a non-scaling stroke keeps the
   line a constant 3px no matter the box size. The drag direction is stored per
   line (in its `text` field, which lines don't otherwise use): "/" = anti-diagonal
   (bottom-left → top-right), anything else = main diagonal (top-left → bottom-right).
   This lets "/", "\\", horizontal and vertical lines all follow the gesture. */
function lineSvg(color, dir) {
  const [x1, y1, x2, y2] = dir === "/" ? [0, 100, 100, 0] : [0, 0, 100, 100];
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none">`
       + `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${escapeHtml(color)}" `
       + `stroke-width="3" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`;
}

const sceneEl = () => $("scene");

/* full rebuild of the canvas DOM — used after structural changes (load, add,
   delete, reorder). Selection changes use selectVisual() instead so the shape
   DOM nodes survive between the two clicks of a dblclick (text edit). */
function render() {
  buildShapes();
  selectVisual();
}

function buildShapes() {
  const scene = sceneEl();
  scene.querySelectorAll(".shape, .selframe, .marquee").forEach(n => n.remove());
  $("canvas").querySelectorAll(".empty").forEach(n => n.remove());

  if (!shapes.length) {
    const e = document.createElement("div");
    e.className = "empty";
    e.innerHTML = "<b>Empty canvas</b><div>Pick a tool below and drag (or click) on the canvas to draw.</div>";
    $("canvas").appendChild(e);
  }
  for (const sh of shapes) scene.appendChild(makeShapeEl(sh));
}

function applyBox(el, sh) {
  el.style.left = sh.x + "px";  el.style.top = sh.y + "px";
  el.style.width = sh.w + "px";
  if (sh.kind === "text") { el.style.height = "auto"; el.style.minHeight = sh.h + "px"; }
  else                    { el.style.height = sh.h + "px"; }
}

function makeShapeEl(sh) {
  const el = document.createElement("div");
  el.className = "shape " + sh.kind;
  el.dataset.id = sh._guid;
  el.tabIndex = 0;                                   // keyboard focusable
  el.setAttribute("role", "button");
  el.setAttribute("aria-label",
    `${sh.kind}${sh.kind === "text" && sh.text ? ": " + sh.text : ""}`);
  applyBox(el, sh);
  if (sh.kind === "text")      { el.textContent = sh.text || "Text"; el.style.color = sh.fill; }
  else if (sh.kind === "line") { el.innerHTML = lineSvg(sh.fill, sh.text); }   // fill→stroke, text→direction
  else                         { el.style.background = sh.fill; }

  el.addEventListener("mousedown", (e) => onShapeDown(e, sh));
  el.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectOnly(sh._guid); }
  });
  if (sh.kind === "text") el.addEventListener("dblclick", (e) => startTextEdit(e, sh, el));
  return el;
}

/* draw selection frames inside #scene (so zoom/pan transform them too):
   - single selection → one frame with 4 resize handles;
   - multi-selection  → a thin outline per member PLUS one union "group" frame
     whose handles scale every selected shape together (proportionally). */
const HANDLES_HTML =
  '<span class="h nw"></span><span class="h ne"></span>'
  + '<span class="h sw"></span><span class="h se"></span>';

function wireHandles(frame, onDown) {
  frame.querySelectorAll(".h").forEach(h2 => {
    const corner = ["nw","ne","sw","se"].find(c => h2.classList.contains(c));
    h2.addEventListener("mousedown", (e) => onDown(e, corner));
  });
}

function updateFrames() {
  const scene = sceneEl();
  scene.querySelectorAll(".selframe").forEach(n => n.remove());
  if (!sel.size) return;
  const single = sel.size === 1;
  const boxes = [];
  for (const id of sel) {
    const sh = shapes.find(s => s._guid === id);
    if (!sh) continue;
    const el = scene.querySelector(`.shape[data-id="${id}"]`);
    const w = el ? el.offsetWidth : sh.w;
    const h = el ? el.offsetHeight : sh.h;            // text grows to fit content
    boxes.push({ x: sh.x, y: sh.y, w, h });
    const f = document.createElement("div");
    f.className = "selframe" + (single ? "" : " member");
    f.style.left = sh.x + "px";  f.style.top = sh.y + "px";
    f.style.width = w + "px";    f.style.height = h + "px";
    if (single) { f.innerHTML = HANDLES_HTML; }
    scene.appendChild(f);
    if (single) wireHandles(f, (e, corner) => onHandleDown(e, sh, corner));
  }
  if (!single && boxes.length) {
    const minX = Math.min(...boxes.map(b => b.x)), minY = Math.min(...boxes.map(b => b.y));
    const maxX = Math.max(...boxes.map(b => b.x + b.w)), maxY = Math.max(...boxes.map(b => b.y + b.h));
    const box = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    const gf = document.createElement("div");
    gf.className = "selframe groupframe";
    gf.style.left = box.x + "px";  gf.style.top = box.y + "px";
    gf.style.width = box.w + "px"; gf.style.height = box.h + "px";
    gf.innerHTML = HANDLES_HTML;
    scene.appendChild(gf);
    wireHandles(gf, (e, corner) => onGroupHandleDown(e, corner, { ...box }));
  }
}

/* the union bounding box of the current selection (member heights are taken
   from the rendered DOM so tall/auto-height text is included). */
function groupBox() {
  const scene = sceneEl();
  const boxes = shapes.filter(s => sel.has(s._guid)).map(s => {
    const el = scene.querySelector(`.shape[data-id="${s._guid}"]`);
    return { x: s.x, y: s.y, w: el ? el.offsetWidth : s.w, h: el ? el.offsetHeight : s.h };
  });
  if (!boxes.length) return null;
  const minX = Math.min(...boxes.map(b => b.x)), minY = Math.min(...boxes.map(b => b.y));
  const maxX = Math.max(...boxes.map(b => b.x + b.w)), maxY = Math.max(...boxes.map(b => b.y + b.h));
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

/* map every selected shape from union box `box0` into `target`, scaling position
   and size proportionally about target's top-left. `items` carry each shape's
   geometry frozen at gesture start. */
function setGroupBox(box0, target, items) {
  const sx = box0.w ? target.w / box0.w : 1;
  const sy = box0.h ? target.h / box0.h : 1;
  const scene = sceneEl();
  for (const it of items) {
    it.s.x = Math.round(target.x + (it.x - box0.x) * sx);
    it.s.y = Math.round(target.y + (it.y - box0.y) * sy);
    it.s.w = Math.max(MIN_SIZE, Math.round(it.w * sx));
    it.s.h = Math.max(MIN_SIZE, Math.round(it.h * sy));
    const el = scene.querySelector(`.shape[data-id="${it.s._guid}"]`);
    if (el) applyBox(el, it.s);
  }
}
function groupItems() {
  return shapes.filter(s => sel.has(s._guid)).map(s => ({ s, x: s.x, y: s.y, w: s.w, h: s.h }));
}
// after a group transform, text heights are content-driven — re-read them
function settleTextHeights(items) {
  const scene = sceneEl();
  for (const it of items) if (it.s.kind === "text") {
    const el = scene.querySelector(`.shape[data-id="${it.s._guid}"]`);
    if (el) it.s.h = el.offsetHeight;
  }
}

/* drag a handle of the multi-select union box: the opposite corner stays anchored
   and every selected shape scales proportionally with the box. */
function onGroupHandleDown(e, corner, box0) {
  e.stopPropagation();
  e.preventDefault();
  const sx = e.clientX, sy = e.clientY;
  const right = box0.x + box0.w, bottom = box0.y + box0.h;
  const movesLeft   = corner === "nw" || corner === "sw";
  const movesRight  = corner === "ne" || corner === "se";
  const movesTop    = corner === "nw" || corner === "ne";
  const movesBottom = corner === "sw" || corner === "se";
  const items = groupItems();

  function move(ev) {
    const dx = (ev.clientX - sx) / view.scale, dy = (ev.clientY - sy) / view.scale;
    let nx = box0.x, ny = box0.y, nw = box0.w, nh = box0.h;
    if (movesLeft)   { const l = Math.min(box0.x + dx, right - MIN_SIZE); nx = l; nw = right - l; }
    if (movesRight)  { const r = Math.max(right + dx, box0.x + MIN_SIZE); nw = r - box0.x; }
    if (movesTop)    { const t = Math.min(box0.y + dy, bottom - MIN_SIZE); ny = t; nh = bottom - t; }
    if (movesBottom) { const b = Math.max(bottom + dy, box0.y + MIN_SIZE); nh = b - box0.y; }
    setGroupBox(box0, { x: nx, y: ny, w: nw, h: nh }, items);
    updateFrames();
    syncGroupInputs();
  }
  function up() {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    settleTextHeights(items);
    commitShapes(items.map(it => it.s), ["x","y","w","h"]);
  }
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

/* ------- resize: drag a corner; the OPPOSITE corner stays anchored ------- */
const MIN_SIZE = 1;
function onHandleDown(e, sh, corner) {
  e.stopPropagation();
  e.preventDefault();
  const sx = e.clientX, sy = e.clientY;
  const x0 = sh.x, y0 = sh.y, w0 = sh.w, h0 = sh.h;
  const right = x0 + w0, bottom = y0 + h0;          // anchored edges live here
  const movesLeft   = corner === "nw" || corner === "sw";
  const movesRight  = corner === "ne" || corner === "se";
  const movesTop    = corner === "nw" || corner === "ne";
  const movesBottom = corner === "sw" || corner === "se";
  const el = sceneEl().querySelector(`.shape[data-id="${sh._guid}"]`);
  const f  = sceneEl().querySelector(".selframe");

  function move(ev) {
    const dx = (ev.clientX - sx) / view.scale, dy = (ev.clientY - sy) / view.scale;
    let nx = x0, ny = y0, nw = w0, nh = h0;
    if (movesLeft)   { const l = Math.min(x0 + dx, right - MIN_SIZE); nx = Math.round(l); nw = Math.round(right - l); }
    if (movesRight)  { const r = Math.max(right + dx, x0 + MIN_SIZE); nw = Math.round(r - x0); }
    if (movesTop)    { const t = Math.min(y0 + dy, bottom - MIN_SIZE); ny = Math.round(t); nh = Math.round(bottom - t); }
    if (movesBottom) { const b = Math.max(bottom + dy, y0 + MIN_SIZE); nh = Math.round(b - y0); }
    sh.x = nx; sh.y = ny; sh.w = nw; sh.h = nh;
    if (el) applyBox(el, sh);                         // line redraws corner-to-corner automatically
    if (f) {
      const fh = el ? el.offsetHeight : nh;           // text height is content-driven
      f.style.left = nx + "px"; f.style.top = ny + "px"; f.style.width = nw + "px"; f.style.height = fh + "px";
    }
    syncBoxInputs(sh);                                // live W/H/X/Y in the inspector
  }
  function up() {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    if (sh.kind === "text" && el) sh.h = el.offsetHeight;   // persist the wrapped height
    patchShape(sh._guid, { x: sh.x, y: sh.y, w: sh.w, h: sh.h }, false);  // one PATCH, no re-render
  }
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

/* ------- interaction: draw, select, drag, marquee, pan ------------------ */
function canvasPoint(e) {
  const r = $("canvas").getBoundingClientRect();
  return {
    x: (e.clientX - r.left - view.tx) / view.scale,
    y: (e.clientY - r.top  - view.ty) / view.scale,
  };
}
function rectsIntersect(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

let spaceDown = false;
$("canvas").addEventListener("mousedown", (e) => {
  if (spaceDown || e.button === 1) { startPan(e); return; }   // space-drag / middle-drag pan
  if (e.target.id !== "canvas" && e.target.id !== "scene") return;  // background only
  if (tool === "select") { startMarquee(e); return; }
  startDrawDrag(e);
});

/* click-drag to draw a shape at a chosen size; a bare click drops a sensible
   default size centered on the cursor (Figma behaviour). */
function startDrawDrag(e) {
  const drawTool = tool;
  const start = canvasPoint(e);
  let cur = start;
  const preview = document.createElement("div");
  preview.className = "shape " + drawTool + " preview";
  if (drawTool === "line") preview.innerHTML = lineSvg(drawFill);
  else if (drawTool !== "text") preview.style.background = drawFill;
  sceneEl().appendChild(preview);

  function place(el) {
    el.style.left = Math.min(start.x, cur.x) + "px";
    el.style.top  = Math.min(start.y, cur.y) + "px";
    el.style.width  = Math.abs(cur.x - start.x) + "px";
    el.style.height = Math.abs(cur.y - start.y) + "px";
  }
  // a line follows the gesture: opposite signs of dx/dy ⇒ "/" (anti-diagonal)
  const lineDir = () => ((cur.x - start.x) * (cur.y - start.y) < 0 ? "/" : "\\");
  function move(ev) {
    cur = canvasPoint(ev);
    place(preview);
    if (drawTool === "line") preview.innerHTML = lineSvg(drawFill, lineDir());
  }
  function up() {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    preview.remove();
    const w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    const opts = drawTool === "line" ? { dir: lineDir() } : {};
    if (w < 4 && h < 4) {
      const def = { rect:{w:180,h:120}, ellipse:{w:160,h:160}, text:{w:200,h:48}, line:{w:200,h:140} }[drawTool];
      createShape(drawTool, start.x - def.w / 2, start.y - def.h / 2, def.w, def.h, opts);
    } else {
      createShape(drawTool, Math.min(start.x, cur.x), Math.min(start.y, cur.y),
                  Math.max(Math.round(w), MIN_SIZE), Math.max(Math.round(h), MIN_SIZE), opts);
    }
  }
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

/* drag an empty area (select tool) to marquee-select intersecting shapes */
function startMarquee(e) {
  const start = canvasPoint(e);
  const additive = e.shiftKey;
  const base = new Set(additive ? sel : []);
  const m = document.createElement("div");
  m.className = "marquee";
  sceneEl().appendChild(m);
  let dragged = false;

  function move(ev) {
    const c = canvasPoint(ev);
    const x = Math.min(start.x, c.x), y = Math.min(start.y, c.y);
    const w = Math.abs(c.x - start.x), h = Math.abs(c.y - start.y);
    if (w > 3 || h > 3) dragged = true;
    m.style.left = x + "px"; m.style.top = y + "px"; m.style.width = w + "px"; m.style.height = h + "px";
    const ns = new Set(base);
    for (const s of shapes) if (rectsIntersect(x, y, w, h, s.x, s.y, s.w, s.h)) ns.add(s._guid);
    sel = ns;
    updateFrames();
  }
  function up() {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    m.remove();
    if (dragged) renderInspector();
    else { sel = additive ? base : new Set(); selectVisual(); }   // bare click clears
  }
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

function startPan(e) {
  e.preventDefault();
  $("canvas").style.cursor = "grabbing";
  const sx = e.clientX, sy = e.clientY, tx0 = view.tx, ty0 = view.ty;
  function move(ev) { view.tx = tx0 + (ev.clientX - sx); view.ty = ty0 + (ev.clientY - sy); applyView(); }
  function up() {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    $("canvas").style.cursor = spaceDown ? "grab" : "";
  }
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

async function createShape(kind, x, y, w, h, opts = {}) {
  const z = shapes.length ? Math.max(...shapes.map(s => s.z)) + 1 : 1;
  // `text` carries content for text shapes and the diagonal direction for lines
  const text = kind === "text" ? "Text" : (kind === "line" ? (opts.dir || "\\") : "");
  const body = {
    kind, x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h),
    fill: drawFill, text, z, doc: docGuid,
  };
  try {
    const created = await api("POST", "/objects/shape", body);
    shapes.push(created);
    setTool("select");
    buildShapes();
    selectOnly(created._guid);
    // Text: drop straight into edit mode with a caret (Figma behaviour), no dblclick needed
    if (kind === "text") {
      const el = sceneEl().querySelector(`.shape[data-id="${created._guid}"]`);
      if (el) startTextEdit(null, created, el);
    }
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

function onShapeDown(e, sh) {
  e.stopPropagation();
  if (tool !== "select") { startDrawDrag(e); return; }   // drawing tools draw, even over a shape
  if (e.target.isContentEditable) return;                // mid text-edit: let the caret work

  if (e.shiftKey) {
    if (sel.has(sh._guid)) { sel.delete(sh._guid); selectVisual(); return; }  // toggle off
    sel.add(sh._guid); selectVisual();
  } else if (!sel.has(sh._guid)) {
    sel = new Set([sh._guid]); selectVisual();
  }

  // selectVisual() does NOT rebuild shape DOM, so e.currentTarget stays live —
  // optimistic drag works AND a follow-up click lands on the same node (dblclick).
  const moving = shapes.filter(s => sel.has(s._guid));
  const starts = moving.map(s => ({
    s, ox: s.x, oy: s.y,
    el: sceneEl().querySelector(`.shape[data-id="${s._guid}"]`),
  }));
  const sx = e.clientX, sy = e.clientY;
  let moved = false;

  function move(ev) {
    const dx = (ev.clientX - sx) / view.scale, dy = (ev.clientY - sy) / view.scale;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) moved = true;
    for (const it of starts) {
      it.s.x = Math.round(it.ox + dx); it.s.y = Math.round(it.oy + dy);
      if (it.el) { it.el.style.left = it.s.x + "px"; it.el.style.top = it.s.y + "px"; }
    }
    updateFrames();
    if (sel.size === 1) syncPosInputs(moving[0]);
  }
  function up() {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    if (moved) commitGeo(moving);   // persist new x/y for every dragged shape
  }
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

/* selection helpers ----------------------------------------------------- */
function pruneSel() { for (const id of [...sel]) if (!shapes.find(s => s._guid === id)) sel.delete(id); }
function selectVisual() { pruneSel(); updateFrames(); renderInspector(); }
function selectOnly(id) { sel = new Set(id ? [id] : []); selectVisual(); }
function toggleSel(id)  { if (sel.has(id)) sel.delete(id); else sel.add(id); selectVisual(); }

/* ------- mutations (every edit is a PATCH to MorphDB) ------------------- */
// low-level: write a single field-set, update local cache, NO render/history
async function writeShape(guid, body) {
  const updated = await api("PATCH", `/objects/shape/${guid}`, body);
  const i = shapes.findIndex(s => s._guid === guid);
  if (i >= 0) Object.assign(shapes[i], updated);
  return updated;
}

async function patchShape(guid, body, rerender = true) {
  try {
    await writeShape(guid, body);
    if (rerender) { shapes.sort((a, b) => a.z - b.z); render(); }
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

// commit moved x/y for many shapes as serialized writes, then ONE history entry
async function commitGeo(list) {
  try {
    for (const s of list) await writeShape(s._guid, { x: s.x, y: s.y });
    render();
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

// commit an arbitrary set of geometry fields for many shapes, then ONE history entry
async function commitShapes(list, keys) {
  try {
    for (const s of list) {
      const b = {}; for (const k of keys) b[k] = s[k];
      await writeShape(s._guid, b);
    }
    render();
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

/* ------- copy / paste / duplicate (in-memory clipboard) ----------------- */
let clipboard = [];
function selectionData() {
  return shapes.filter(s => sel.has(s._guid)).map(s => {
    const o = {}; for (const k of FIELDS) o[k] = s[k]; return o;
  });
}
function copySelection() { if (sel.size) clipboard = selectionData(); }
// clone a list of shape field-sets as brand-new objects (fresh guids, max-z, offset)
async function cloneShapes(list, dx, dy) {
  if (!list.length) return;
  try {
    let top = shapes.length ? Math.max(...shapes.map(s => s.z)) : 0;
    const newIds = [];
    for (const o of list) {
      top++;
      const body = { doc: docGuid };
      for (const k of FIELDS) body[k] = o[k];
      body.x = Math.round(o.x + dx); body.y = Math.round(o.y + dy); body.z = top;
      const created = await api("POST", "/objects/shape", body);
      shapes.push(created);
      newIds.push(created._guid);
    }
    shapes.sort((a, b) => a.z - b.z);
    sel = new Set(newIds);          // select the clones, like Figma
    render();
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}
function duplicateSelection() { cloneShapes(selectionData(), 24, 24); }
function pasteClipboard()     { cloneShapes(clipboard, 24, 24); }

async function deleteSelected() {
  const ids = [...sel];
  if (!ids.length) return;
  try {
    for (const id of ids) {
      await api("DELETE", `/objects/shape/${id}`);
      shapes = shapes.filter(s => s._guid !== id);
    }
    sel.clear();
    render();
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

// raise/lower every selected shape together
async function arrangeSelected(front) {
  const ordered = [...sel].map(id => shapes.find(s => s._guid === id))
                          .filter(Boolean).sort((a, b) => a.z - b.z);
  if (!ordered.length) return;
  try {
    if (front) {
      let top = Math.max(...shapes.map(s => s.z));
      for (const s of ordered) { top++; await writeShape(s._guid, { z: top }); }
    } else {
      let bot = Math.min(...shapes.map(s => s.z));
      for (const s of [...ordered].reverse()) { bot--; await writeShape(s._guid, { z: bot }); }
    }
    shapes.sort((a, b) => a.z - b.z);
    render();
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

// step a single layer one place forward/back by swapping z with its neighbour
async function layerStep(sh, dir) {
  const ordered = [...shapes].sort((a, b) => a.z - b.z);
  const i = ordered.findIndex(s => s._guid === sh._guid);
  const j = i + dir;
  if (j < 0 || j >= ordered.length) return;
  const other = ordered[j], za = sh.z, zb = other.z;
  try {
    await writeShape(sh._guid, { z: zb });
    await writeShape(other._guid, { z: za });
    shapes.sort((a, b) => a.z - b.z);
    render();
    pushHistory();
    setErr("");
  } catch (e) { setErr(e.message); }
}

function startTextEdit(e, sh, el) {
  if (e) e.stopPropagation();
  el.contentEditable = "true";
  el.focus();
  const r = document.createRange(); r.selectNodeContents(el);
  const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
  let done = false;
  const commit = () => {
    if (done) return; done = true;
    el.contentEditable = "false";
    const t = el.textContent.trim();
    el.removeEventListener("blur", commit);
    const h = Math.max(MIN_SIZE, el.offsetHeight);   // auto-height to fit content
    patchShape(sh._guid, { text: t || "Text", h });
  };
  el.addEventListener("blur", commit);
  el.addEventListener("keydown", (ev) => {
    if (ev.key === "Escape") { ev.preventDefault(); el.blur(); }
    if (ev.key === "Enter" && (ev.metaKey || ev.ctrlKey)) { ev.preventDefault(); el.blur(); }
  });
}

/* ------- undo / redo (snapshot history reconciled to the backend) ------- */
let history = [];
let histIndex = -1;
const FIELDS = ["kind","x","y","w","h","fill","text","z"];

function snapshot() {
  return shapes.map(s => {
    const o = { _guid: s._guid };
    for (const k of FIELDS) o[k] = s[k];
    return o;
  });
}
function pushHistory() {
  if (busy) return;
  history = history.slice(0, histIndex + 1);
  history.push(snapshot());
  histIndex = history.length - 1;
  updateHistButtons();
}
// a recreated shape gets a fresh guid; rewrite stored snapshots + selection
function remapGuid(oldG, newG) {
  for (const snap of history) for (const s of snap) if (s._guid === oldG) s._guid = newG;
  if (sel.has(oldG)) { sel.delete(oldG); sel.add(newG); }
}
// make the backend (and local state) match a target snapshot with minimal writes
async function reconcile(target) {
  const tgt = new Map(target.map(s => [s._guid, s]));
  for (const s of [...shapes]) if (!tgt.has(s._guid)) await api("DELETE", `/objects/shape/${s._guid}`);
  const recreated = [];                                    // shapes brought back (fresh guids)
  for (const t of target) {
    const cur = shapes.find(s => s._guid === t._guid);
    if (!cur) {
      const body = { doc: docGuid };
      for (const k of FIELDS) body[k] = t[k];
      const created = await api("POST", "/objects/shape", body);
      remapGuid(t._guid, created._guid);
      recreated.push(created._guid);
    } else {
      const body = {};
      for (const k of FIELDS) if (cur[k] !== t[k]) body[k] = t[k];
      if (Object.keys(body).length) await api("PATCH", `/objects/shape/${t._guid}`, body);
    }
  }
  await loadShapes();
  // re-select anything this step recreated — e.g. undoing a delete restores its selection
  if (recreated.length) { sel = new Set(recreated); selectVisual(); }
}
async function undo() {
  if (busy || histIndex <= 0) return;
  busy = true; histIndex--;
  try { await reconcile(history[histIndex]); setErr(""); }
  catch (e) { setErr(e.message); }
  busy = false; updateHistButtons();
}
async function redo() {
  if (busy || histIndex >= history.length - 1) return;
  busy = true; histIndex++;
  try { await reconcile(history[histIndex]); setErr(""); }
  catch (e) { setErr(e.message); }
  busy = false; updateHistButtons();
}
function updateHistButtons() {
  const u = $("undoBtn"), r = $("redoBtn");
  if (u) u.disabled = histIndex <= 0;
  if (r) r.disabled = histIndex >= history.length - 1;
}

/* ------- inspector ------------------------------------------------------ */
function syncPosInputs(sh) {
  const x = $("in-x"), y = $("in-y");
  if (x) x.value = Math.round(sh.x);
  if (y) y.value = Math.round(sh.y);
}
function syncBoxInputs(sh) {
  const set = (id, v) => { const el = $(id); if (el) el.value = Math.round(v); };
  set("in-x", sh.x); set("in-y", sh.y); set("in-w", sh.w); set("in-h", sh.h);
}
function syncGroupInputs() { const gb = groupBox(); if (gb) syncBoxInputs(gb); }

// live (un-persisted) fill update so the native color picker can scrub without
// the inspector re-rendering out from under it (which closed the popup before)
function liveFill(sh, c) {
  sh.fill = c;
  const el = sceneEl().querySelector(`.shape[data-id="${sh._guid}"]`);
  if (el) {
    if (sh.kind === "text") el.style.color = c;
    else if (sh.kind === "line") el.innerHTML = lineSvg(c, sh.text);
    else el.style.background = c;
  }
  const hx = $("in-hex"); if (hx) { hx.value = c; hx.classList.remove("invalid"); }
}

function renderInspector() {
  const body = $("inspectBody");
  const selShapes = shapes.filter(s => sel.has(s._guid));
  const num = (lbl, id, v) =>
    `<div class="field"><label for="${id}">${lbl}</label><input id="${id}" type="number" value="${Math.round(v)}"></div>`;

  // nothing selected
  if (selShapes.length === 0) {
    body.innerHTML =
      `<div class="hint">
         <b>Nothing selected.</b><br>
         Pick <span class="kbd">R</span> rectangle, <span class="kbd">O</span> ellipse,
         <span class="kbd">T</span> text, or <span class="kbd">L</span> line, then drag on the canvas.
         Drag to move, drag a corner to resize, double-click text to edit, arrow keys nudge,
         <span class="kbd">Del</span> deletes. <span class="kbd">⌘Z</span> undo ·
         scroll to pan · <span class="kbd">⌘</span>+scroll or pinch to zoom.
       </div>` + layersHtml();
    wireLayers();
    return;
  }

  // multi-selection: union bounding box (shared X/Y/W/H) + shared actions
  if (selShapes.length > 1) {
    const gb = groupBox() || { x: 0, y: 0, w: 0, h: 0 };
    body.innerHTML = `
      <div class="sect">
        <h3>${selShapes.length} selected</h3>
        <div class="row">${num("X","in-x",gb.x)}${num("Y","in-y",gb.y)}</div>
        <div class="row mt8">${num("W","in-w",gb.w)}${num("H","in-h",gb.h)}</div>
      </div>
      <div class="sect">
        <h3>Arrange</h3>
        <div class="row">
          <button class="btn" id="front">Bring to front</button>
          <button class="btn" id="back">Send to back</button>
        </div>
        <div class="row mt8">
          <button class="btn danger" id="del">Delete ${selShapes.length} shapes</button>
        </div>
      </div>
      ${layersHtml()}`;
    // editing a group dimension translates (X/Y) or scales (W/H) the whole selection
    for (const [id, key] of [["in-x","x"],["in-y","y"],["in-w","w"],["in-h","h"]]) {
      $(id).addEventListener("change", (e) => {
        const box0 = groupBox(); if (!box0) return;
        let v = Math.round(Number(e.target.value));
        if (!Number.isFinite(v)) { e.target.value = Math.round(box0[key]); return; }
        if ((key === "w" || key === "h") && v < 1) v = 1;
        const target = { ...box0 }; target[key] = v;
        const items = groupItems();
        setGroupBox(box0, target, items);
        settleTextHeights(items);
        commitShapes(items.map(it => it.s), ["x","y","w","h"]);
      });
    }
    $("front").addEventListener("click", () => arrangeSelected(true));
    $("back").addEventListener("click",  () => arrangeSelected(false));
    $("del").addEventListener("click",   () => deleteSelected());
    wireLayers();
    return;
  }

  // single selection: full inspector
  const sh = selShapes[0];

  body.innerHTML = `
    <div class="sect">
      <h3>${KIND_ICON[sh.kind]}&nbsp; ${sh.kind}</h3>
      <div class="row">${num("X","in-x",sh.x)}${num("Y","in-y",sh.y)}</div>
      <div class="row mt8">${num("W","in-w",sh.w)}${num("H","in-h",sh.h)}</div>
    </div>

    <div class="sect">
      <h3>Fill</h3>
      <div class="swatches">${PALETTE.map(c =>
        `<div class="sw ${c.toLowerCase()===String(sh.fill).toLowerCase()?'active':''}"
              style="background:${c}" data-c="${c}" role="button" tabindex="0"
              aria-label="Set fill ${c}"></div>`).join("")}</div>
      <div class="fillrow">
        <label for="in-color" class="sr-only">Fill color picker</label>
        <input type="color" id="in-color" value="${toHex(sh.fill)}">
        <label for="in-hex" class="sr-only">Fill hex value</label>
        <input class="hex" id="in-hex" value="${escapeAttr(sh.fill)}" spellcheck="false">
      </div>
      <div class="hexnote" id="hexnote" role="status" aria-live="polite"></div>
    </div>

    ${sh.kind === "text" ? `
    <div class="sect">
      <h3>Text</h3>
      <label for="tx" class="sr-only">Text content</label>
      <textarea id="tx" spellcheck="false">${escapeHtml(sh.text || "")}</textarea>
    </div>` : ""}

    <div class="sect">
      <h3>Arrange</h3>
      <div class="row">
        <button class="btn" id="front">Bring to front</button>
        <button class="btn" id="back">Send to back</button>
      </div>
      <div class="row mt8">
        <button class="btn danger" id="del">Delete shape</button>
      </div>
    </div>
    ${layersHtml()}`;

  // wire position / size — clamp W/H to >= 1 so a shape can't collapse to 0px
  for (const [id, key] of [["in-x","x"],["in-y","y"],["in-w","w"],["in-h","h"]]) {
    $(id).addEventListener("change", (e) => {
      let v = Math.round(Number(e.target.value));
      if (!Number.isFinite(v)) { e.target.value = Math.round(sh[key]); return; }
      if ((key === "w" || key === "h") && v < 1) { v = 1; e.target.value = 1; }
      patchShape(sh._guid, { [key]: v });
    });
  }
  // wire fill swatches (clickable + keyboard)
  body.querySelectorAll(".sw").forEach(s => {
    const apply = () => patchShape(sh._guid, { fill: s.dataset.c });
    s.addEventListener("click", apply);
    s.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); apply(); } });
  });
  // wire native color picker: scrub live (input), persist once (change)
  $("in-color").addEventListener("input",  (e) => liveFill(sh, e.target.value));
  $("in-color").addEventListener("change", (e) => patchShape(sh._guid, { fill: e.target.value }));
  // wire hex with validation — feedback stays inline on the field; a local typo
  // must NOT masquerade as a backend/sync failure, so it never touches setErr.
  $("in-hex").addEventListener("change", (e) => {
    const v = e.target.value.trim();
    if (!isValidColor(v)) {
      e.target.classList.add("invalid");
      const note = $("hexnote");
      if (note) { note.textContent = `"${v}" is not a valid color`; note.style.display = "block"; }
      e.target.value = sh.fill;
      setTimeout(() => {                              // transient: auto-dismiss
        e.target.classList.remove("invalid");
        const n = $("hexnote"); if (n) n.style.display = "none";
      }, 1600);
      return;
    }
    patchShape(sh._guid, { fill: v });
  });
  // wire text — recompute stored height from the rendered element so H stays in
  // sync (marquee hit-testing and Zoom-to-fit both rely on s.h matching the box)
  if (sh.kind === "text")
    $("tx").addEventListener("change", (e) => {
      const t = e.target.value;
      const el = sceneEl().querySelector(`.shape[data-id="${sh._guid}"]`);
      let h = sh.h;
      if (el) { el.textContent = t || "Text"; h = Math.max(MIN_SIZE, el.offsetHeight); }
      patchShape(sh._guid, { text: t, h });
    });
  // wire arrange
  $("front").addEventListener("click", () => arrangeSelected(true));
  $("back").addEventListener("click",  () => arrangeSelected(false));
  $("del").addEventListener("click",   () => deleteSelected());

  wireLayers();
}

function layersHtml() {
  const ordered = [...shapes].sort((a, b) => b.z - a.z); // top-most first
  const rows = ordered.map(s => {
    const label = s.kind === "text" ? (s.text || "Text") : (s.kind[0].toUpperCase() + s.kind.slice(1));
    return `<div class="layer ${sel.has(s._guid)?'active':''}" data-id="${s._guid}"
                 tabindex="0" role="button" aria-label="${escapeAttr(label)} layer">
        <span class="ic">${KIND_ICON[s.kind]}</span>
        <span class="nm" ${s.kind==='text'?'data-rename="1"':''} title="${s.kind==='text'?'Double-click to rename':''}">${escapeHtml(label)}</span>
        <span class="sw-mini" style="background:${escapeAttr(s.fill)}"></span>
        <button class="step" data-step="1"  title="Bring forward"  aria-label="Bring forward">▲</button>
        <button class="step" data-step="-1" title="Send backward" aria-label="Send backward">▼</button>
      </div>`;
  }).join("");
  return `<div class="sect"><h3>Layers · ${shapes.length}</h3>${rows || '<div style="color:var(--muted)">No layers yet</div>'}</div>`;
}

function wireLayers() {
  $("inspectBody").querySelectorAll(".layer").forEach(l => {
    const id = l.dataset.id;
    const sh = shapes.find(s => s._guid === id);
    l.addEventListener("click", (e) => {
      if (e.target.closest(".step") || e.target.isContentEditable) return;
      if (e.shiftKey) toggleSel(id); else selectOnly(id);
    });
    l.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        if (e.target.closest(".step") || e.target.isContentEditable) return;
        e.preventDefault();
        if (e.shiftKey) toggleSel(id); else selectOnly(id);
      }
    });
    l.querySelectorAll(".step").forEach(b => {
      b.addEventListener("click", (e) => { e.stopPropagation(); layerStep(sh, Number(b.dataset.step)); });
    });
    // rename a text layer in place (double-click its name)
    const nm = l.querySelector(".nm[data-rename]");
    if (nm) nm.addEventListener("dblclick", (e) => {
      e.stopPropagation();
      nm.contentEditable = "true"; nm.focus();
      const r = document.createRange(); r.selectNodeContents(nm);
      const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
      let done = false;
      const commit = () => {
        if (done) return; done = true;
        nm.contentEditable = "false";
        patchShape(id, { text: nm.textContent.trim() || "Text" });
      };
      nm.addEventListener("blur", commit);
      nm.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") { ev.preventDefault(); nm.blur(); }
        if (ev.key === "Escape") { ev.preventDefault(); done = true; nm.contentEditable = "false"; renderInspector(); }
      });
    });
  });
}

/* ------- toolbar -------------------------------------------------------- */
function setTool(t) {
  tool = t;
  document.querySelectorAll(".tool").forEach(b => {
    const on = b.dataset.tool === t;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });
  $("canvas").classList.toggle("draw", t !== "select");
}
document.querySelectorAll(".tool").forEach(b =>
  b.addEventListener("click", () => setTool(b.dataset.tool)));

function setDrawFill(c) { drawFill = c; $("drawFillChip").style.background = c; }
$("drawFillBtn").addEventListener("click", () => {
  const inp = document.createElement("input");
  inp.type = "color"; inp.value = toHex(drawFill);
  inp.style.position = "fixed"; inp.style.opacity = "0";
  document.body.appendChild(inp);
  inp.addEventListener("input", () => setDrawFill(inp.value));
  inp.addEventListener("change", () => inp.remove());
  inp.click();
});

/* ------- zoom / pan ----------------------------------------------------- */
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
function applyView() {
  const sc = sceneEl();
  if (sc) sc.style.transform = `translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
  $("canvas").style.backgroundPosition = `${view.tx}px ${view.ty}px`;
  const zv = $("zoomVal"); if (zv) zv.textContent = Math.round(view.scale * 100) + "%";
}
function zoomTo(ns, cx, cy) {
  ns = clamp(ns, 0.1, 8);
  const k = ns / view.scale;
  view.tx = cx - (cx - view.tx) * k;
  view.ty = cy - (cy - view.ty) * k;
  view.scale = ns;
  applyView();
}
function zoomByCenter(factor) {
  const r = $("canvas").getBoundingClientRect();
  zoomTo(view.scale * factor, r.width / 2, r.height / 2);
}
function zoomReset() { view = { scale: 1, tx: 0, ty: 0 }; applyView(); }
function zoomFit() {
  if (!shapes.length) return zoomReset();
  const minX = Math.min(...shapes.map(s => s.x)), minY = Math.min(...shapes.map(s => s.y));
  const maxX = Math.max(...shapes.map(s => s.x + s.w)), maxY = Math.max(...shapes.map(s => s.y + s.h));
  const r = $("canvas").getBoundingClientRect();
  const pad = 60;
  const s = clamp(Math.min((r.width - 2*pad) / (maxX - minX || 1), (r.height - 2*pad) / (maxY - minY || 1)), 0.1, 2);
  view.scale = s; view.tx = pad - minX * s; view.ty = pad - minY * s;
  applyView();
}
$("stage").addEventListener("wheel", (e) => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    const r = $("canvas").getBoundingClientRect();
    zoomTo(view.scale * Math.exp(-e.deltaY * 0.0015), e.clientX - r.left, e.clientY - r.top);
  } else {
    view.tx -= e.deltaX; view.ty -= e.deltaY; applyView();
  }
}, { passive: false });
$("zoomIn").addEventListener("click",  () => zoomByCenter(1.2));
$("zoomOut").addEventListener("click", () => zoomByCenter(1 / 1.2));
$("zoomFit").addEventListener("click", zoomFit);
$("zoomVal").addEventListener("click", zoomReset);

/* ------- history buttons (header) — wire the existing enable/disable logic */
$("undoBtn").addEventListener("click", undo);
$("redoBtn").addEventListener("click", redo);

/* ------- doc name + keyboard ------------------------------------------- */
$("docName").addEventListener("change", async (e) => {
  const name = e.target.value.trim() || "Untitled";
  e.target.value = name;          // reflect what was actually saved (no blank field)
  try { await api("PATCH", `/objects/doc/${docGuid}`, { name }); setErr(""); }
  catch (err) { setErr(err.message); }
});

function typing(t) { return t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable); }

/* arrow-key nudge with debounced persistence (one history entry per burst) */
let nudgeTimer = null;
function nudge(dx, dy) {
  if (!sel.size) return;
  const moving = shapes.filter(s => sel.has(s._guid));
  const scene = sceneEl();
  for (const s of moving) {
    s.x += dx; s.y += dy;
    const el = scene.querySelector(`.shape[data-id="${s._guid}"]`);
    if (el) { el.style.left = s.x + "px"; el.style.top = s.y + "px"; }
  }
  updateFrames();
  if (sel.size === 1) syncPosInputs(moving[0]);
  clearTimeout(nudgeTimer);
  nudgeTimer = setTimeout(() => commitGeo(moving), 300);
}

document.addEventListener("keydown", (e) => {
  // undo / redo work even when not focused on the canvas (but not while typing)
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") {
    if (typing(e.target)) return;
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "y") {
    if (typing(e.target)) return;
    e.preventDefault(); redo(); return;
  }
  if (typing(e.target)) return;

  // editing shortcuts: select-all, copy, paste, duplicate
  if (e.metaKey || e.ctrlKey) {
    const k = e.key.toLowerCase();
    if (k === "a") { e.preventDefault(); sel = new Set(shapes.map(s => s._guid)); selectVisual(); return; }
    if (k === "c") { if (sel.size) { e.preventDefault(); copySelection(); } return; }
    if (k === "v") { if (clipboard.length) { e.preventDefault(); pasteClipboard(); } return; }
    if (k === "d") { if (sel.size) { e.preventDefault(); duplicateSelection(); } return; }
  }

  if (e.code === "Space" && !spaceDown) { spaceDown = true; $("canvas").style.cursor = "grab"; e.preventDefault(); return; }

  if ((e.key === "Delete" || e.key === "Backspace") && sel.size) { e.preventDefault(); deleteSelected(); return; }
  if (e.key === "Escape") { selectOnly(null); setTool("select"); return; }

  if (e.key.startsWith("Arrow") && sel.size) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    if (e.key === "ArrowLeft")  nudge(-step, 0);
    if (e.key === "ArrowRight") nudge(step, 0);
    if (e.key === "ArrowUp")    nudge(0, -step);
    if (e.key === "ArrowDown")  nudge(0, step);
    return;
  }

  if (e.metaKey || e.ctrlKey) return;
  if (e.key === "1" && e.shiftKey) { zoomFit(); return; }
  if (e.key === "0" && e.shiftKey) { zoomReset(); return; }
  const map = { v:"select", r:"rect", o:"ellipse", t:"text", l:"line" };
  const k = e.key.toLowerCase();
  if (map[k]) setTool(map[k]);
});
document.addEventListener("keyup", (e) => {
  if (e.code === "Space") { spaceDown = false; $("canvas").style.cursor = ""; }
});

/* ------- helpers -------------------------------------------------------- */
function toHex(c) {
  if (typeof c === "string" && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(c))
    return c.length === 4 ? "#" + [...c.slice(1)].map(x => x + x).join("") : c;
  // best-effort: let the browser resolve named/rgb colors to a hex for the picker
  if (isValidColor(c)) {
    const probe = document.createElement("canvas").getContext("2d");
    probe.fillStyle = "#000"; probe.fillStyle = c;
    if (/^#[0-9a-f]{6}$/i.test(probe.fillStyle)) return probe.fillStyle;
  }
  return "#000000";
}
// validate ANY css color (hex / named / rgb()/rgba()/hsl()) via the CSSOM
function isValidColor(c) {
  if (typeof c !== "string" || !c.trim()) return false;
  const s = new Option().style;
  s.color = "";
  s.color = c.trim();
  return s.color !== "";
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m]));
}
function escapeAttr(s) { return escapeHtml(s); }

/* ------- boot ----------------------------------------------------------- */
(async () => {
  setDrawFill(drawFill);
  applyView();
  await bootstrap();
  try {
    await loadOrSeed();
    pushHistory();           // baseline state for undo
    setErr("");
  } catch (e) {
    if (/unknown app/i.test(e.message)) {
      showBanner(
        "This canvas has no backend yet. Run " +
        "<code>morphdb init morphdb.schema.json</code> from this folder " +
        "(or serve the folder over http), then reload.");
      setErr("backend not provisioned");
    } else {
      setErr("Could not reach MorphDB at " + BASE + " — is it running? (" + e.message + ")");
    }
  }
})();
</script>
</body>
</html>
