<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MorphDB · Noted — a Notion-style example</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%93%93%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --sidebar: #fbfbfa;
    --text: #37352f;
    --muted: #9a9890;
    --faint: #b8b6af;
    --border: #ededec;
    --hover: #efeeec;
    --sel: #e6e5e1;
    --accent: #2383e2;
    --rule: #e4e3e0;
    --callout-bg: #f7f7f5;
    --callout-border: #ededec;
    --menu-bg: #ffffff;
    --menu-shadow: 0 8px 28px rgba(15,15,15,.16), 0 2px 6px rgba(15,15,15,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --sidebar: #202020;
      --text: #e9e9e6;
      --muted: #8b8b86;
      --faint: #6a6a66;
      --border: #2a2a28;
      --hover: #2c2c2a;
      --sel: #38352f;
      --accent: #5b9bd8;
      --rule: #333330;
      --callout-bg: #252523;
      --callout-border: #34342f;
      --menu-bg: #252523;
      --menu-shadow: 0 8px 28px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 15px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; }
  .app { display: flex; height: 100%; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 268px; flex: 0 0 268px; background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    padding: 12px 14px 6px; font-weight: 600; font-size: 14px;
  }
  .brand .logo {
    width: 22px; height: 22px; border-radius: 6px; flex: 0 0 22px;
    background: linear-gradient(135deg, #000 0%, #2c2c2c 100%);
    color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 14px;
  }
  @media (prefers-color-scheme: dark) { .brand .logo { background: linear-gradient(135deg,#f4f4f2,#cfcfca); color:#191919; } }
  .brand .sub { color: var(--muted); font-weight: 400; font-size: 12px; }
  .newpage {
    margin: 4px 8px 8px; padding: 6px 8px; display: flex; align-items: center; gap: 8px;
    border: none; background: none; border-radius: 6px; cursor: pointer;
    color: var(--muted); font-size: 13.5px; width: calc(100% - 16px); text-align: left;
  }
  .newpage:hover { background: var(--hover); color: var(--text); }
  .newpage svg { width: 15px; height: 15px; }
  .section-label { padding: 4px 16px; font-size: 11px; letter-spacing: .04em; font-weight: 600; color: var(--faint); text-transform: uppercase; }
  .tree { overflow-y: auto; flex: 1; padding: 2px 8px 16px; }
  .row {
    display: flex; align-items: center; gap: 2px; height: 28px; padding-right: 4px;
    border-radius: 6px; cursor: pointer; user-select: none; color: var(--text);
  }
  .row:hover { background: var(--hover); }
  .row.active { background: var(--sel); }
  .twisty {
    flex: 0 0 18px; width: 18px; height: 18px; border: none; background: none; padding: 0;
    display: grid; place-items: center; border-radius: 4px; cursor: pointer; color: var(--muted);
    opacity: 0; transition: opacity .1s;
  }
  .row:hover .twisty { opacity: 1; }
  .twisty:hover { background: rgba(140,140,140,.18); }
  .twisty.leaf { pointer-events: none; }
  .twisty svg { width: 12px; height: 12px; transition: transform .12s; }
  .ricon { flex: 0 0 20px; width: 20px; text-align: center; font-size: 15px; line-height: 1; }
  .rtitle {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 14px;
  }
  .rtitle.empty { color: var(--faint); }
  .radd, .rdel {
    flex: 0 0 22px; width: 22px; height: 22px; border: none; background: none; border-radius: 4px;
    display: grid; place-items: center; cursor: pointer; color: var(--muted); opacity: 0; transition: opacity .1s;
    font-size: 16px; line-height: 1;
  }
  .rdel svg { width: 14px; height: 14px; }
  .row:hover .radd, .row:hover .rdel { opacity: 1; }
  .radd:hover, .rdel:hover { background: rgba(140,140,140,.2); color: var(--text); }
  .tree .empty-tree { color: var(--faint); font-size: 13px; padding: 10px 16px; }
  .foot { padding: 8px 16px; border-top: 1px solid var(--border); color: var(--faint); font-size: 11px; }
  .foot code { color: var(--muted); }

  /* ---------- Main ---------- */
  .main { flex: 1; min-width: 0; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar {
    position: sticky; top: 0; z-index: 5; background: var(--bg);
    display: flex; align-items: center; gap: 6px; min-height: 45px; padding: 0 14px;
    border-bottom: 1px solid transparent;
  }
  .crumbs { display: flex; align-items: center; gap: 2px; flex: 1; min-width: 0; overflow: hidden; font-size: 14px; }
  .crumb { display: inline-flex; align-items: center; gap: 5px; padding: 3px 6px; border-radius: 5px; cursor: pointer; color: var(--text);
           white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; border: none; background: none; }
  .crumb:hover { background: var(--hover); }
  .crumb.cur { font-weight: 500; }
  .crumb .ci { font-size: 14px; }
  .sep { color: var(--faint); padding: 0 1px; }
  .topbtn { border: none; background: none; padding: 5px 9px; border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 13.5px; white-space: nowrap; }
  .topbtn:hover { background: var(--hover); color: var(--text); }

  .doc { width: 100%; max-width: 760px; margin: 0 auto; padding: 8px 60px 40vh; flex: 1; }
  .doc-icon {
    font-size: 64px; line-height: 1; display: inline-block; cursor: pointer; border-radius: 10px;
    padding: 2px 6px; margin: 18px 0 2px -6px;
  }
  .doc-icon:hover { background: var(--hover); }
  .doc-title {
    font-size: 40px; line-height: 1.15; font-weight: 700; letter-spacing: -.01em;
    outline: none; margin: 4px 0 10px; min-height: 48px; word-break: break-word;
  }
  .doc-title:empty:before { content: attr(data-ph); color: var(--faint); }

  /* ---------- Blocks ---------- */
  .blocks { margin-top: 4px; }
  .block { display: grid; grid-template-columns: 44px 1fr; align-items: start; position: relative; }
  .gutter { display: flex; align-items: center; justify-content: flex-end; gap: 1px; padding-top: 4px; opacity: 0; transition: opacity .08s; }
  .block:hover .gutter { opacity: 1; }
  .kind-h1 .gutter { padding-top: 16px; }
  .kind-h2 .gutter { padding-top: 11px; }
  .kind-divider .gutter { padding-top: 10px; }
  .gbtn {
    border: none; background: none; border-radius: 4px; cursor: pointer; color: var(--faint);
    display: grid; place-items: center; padding: 0;
  }
  .gbtn.plus { width: 20px; height: 22px; font-size: 17px; }
  .gbtn.handle { width: 17px; height: 22px; }
  .gbtn.handle svg { width: 12px; height: 16px; }
  .gbtn:hover { background: var(--hover); color: var(--text); }
  .content { min-width: 0; }
  .ce { outline: none; padding: 3px 2px; word-break: break-word; white-space: pre-wrap; }
  /* placeholder only on the block you're in — like Notion. Otherwise every empty
     block would permanently show "Type something…", which reads as clutter. */
  .ce:empty:focus:before { content: attr(data-ph); color: var(--faint); pointer-events: none; }
  .ce.text { }
  .ce.h1 { font-size: 1.85em; font-weight: 700; padding-top: 14px; letter-spacing: -.01em; }
  .ce.h2 { font-size: 1.4em; font-weight: 650; padding-top: 9px; }
  .ce.quote {
    border-left: 3px solid var(--text); padding-left: 14px; margin: 3px 0; font-size: 1.02em;
  }
  .kind-todo .content { display: flex; align-items: flex-start; gap: 9px; }
  .todobox { margin: 6px 0 0; width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex: 0 0 16px; }
  .kind-todo .ce { flex: 1; }
  .block.checked .ce.todo { text-decoration: line-through; color: var(--faint); }
  .kind-divider .content { padding: 8px 0; }
  .kind-divider hr { border: none; border-top: 1px solid var(--rule); margin: 0; }
  /* Callout — emoji + text in a softly tinted rounded box, Notion-style. */
  .kind-callout .content { padding: 3px 0; }
  .callout-box {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--callout-bg); border: 1px solid var(--callout-border);
    border-radius: 8px; padding: 11px 14px;
  }
  .callout-emoji { font-size: 18px; line-height: 1.45; flex: 0 0 auto; user-select: none; }
  .kind-callout .ce { flex: 1; min-width: 0; padding-top: 1px; }
  .kind-callout .gutter { padding-top: 14px; }

  .addblock {
    display: flex; align-items: center; gap: 8px; margin: 4px 0 0 44px; padding: 6px 2px;
    color: var(--faint); cursor: text; border-radius: 4px; font-size: 15px; user-select: none;
  }
  .addblock:hover { color: var(--muted); }
  .addblock svg { width: 16px; height: 16px; }

  .doc-empty { text-align: center; color: var(--muted); margin-top: 18vh; }
  .doc-empty .big { font-size: 46px; margin-bottom: 12px; }
  .doc-empty button {
    margin-top: 16px; padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--accent); color: #fff; cursor: pointer; font-weight: 500;
  }

  /* ---------- Floating menu / pickers ---------- */
  .menu {
    position: fixed; z-index: 50; background: var(--menu-bg); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--menu-shadow); padding: 6px; min-width: 188px;
    font-size: 14px; max-height: 78vh; overflow: auto;
  }
  .menu .mlabel { padding: 5px 9px 3px; color: var(--faint); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .mitem { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; border: none; background: none;
           padding: 7px 9px; border-radius: 6px; cursor: pointer; color: var(--text); }
  .mitem:hover, .mitem.sel { background: var(--hover); }
  .mitem .mi { width: 18px; text-align: center; color: var(--muted); font-size: 15px; }
  .mitem.danger { color: #e0544b; }
  .mitem.danger .mi { color: #e0544b; }
  .msep { height: 1px; background: var(--border); margin: 5px 4px; }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; }
  .emoji-grid button { border: none; background: none; font-size: 20px; padding: 5px; border-radius: 6px; cursor: pointer; line-height: 1; }
  .emoji-grid button:hover { background: var(--hover); }
  /* Slash command menu */
  .slash-menu { min-width: 300px; }
  .slash-menu .mitem { align-items: center; }
  .slash-menu .mi { font-size: 17px; width: 34px; height: 34px; display: grid; place-items: center;
                    border: 1px solid var(--border); border-radius: 6px; background: var(--bg); flex: 0 0 34px; }
  .slash-menu .mtext { display: flex; flex-direction: column; min-width: 0; line-height: 1.3; }
  .slash-menu .mname { color: var(--text); }
  .slash-menu .mdesc { color: var(--faint); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slash-menu .mnone { padding: 8px 10px; color: var(--faint); }

  /* ---------- Surfaces ---------- */
  .banner {
    display: none; margin: 12px; padding: 12px 14px; border-radius: 10px;
    background: #fde8e6; color: #8a1c12; border: 1px solid #f5c6c0; font-size: 13.5px;
  }
  @media (prefers-color-scheme: dark) { .banner { background: #3a2220; color: #f3b6af; border-color: #5a302c; } }
  .banner code { background: rgba(0,0,0,.08); padding: 1px 5px; border-radius: 4px; }
  .toast {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    background: #e0544b; color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13.5px;
    box-shadow: 0 6px 20px rgba(0,0,0,.25); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 80; max-width: 80vw;
  }
  .toast.show { opacity: 1; }
  .toast.info { background: #2f2f2c; }
  .toast .toast-undo { margin-left: 12px; background: rgba(255,255,255,.2); border: none; color: #fff;
    padding: 3px 10px; border-radius: 6px; cursor: pointer; pointer-events: auto; font-size: 12.5px; }

  /* ---------- Inline formatting (stored as markdown in the block text) ---------- */
  .ce code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .88em;
    background: var(--callout-bg); border: 1px solid var(--callout-border); border-radius: 4px; padding: .5px 5px; }
  .ce strong { font-weight: 650; }
  .ce s { color: var(--muted); }

  /* ---------- Extra block types ---------- */
  .kind-bullet .content, .kind-numbered .content { display: flex; align-items: flex-start; gap: 8px; }
  .blk-marker { flex: 0 0 auto; color: var(--text); user-select: none; padding-top: 3px; min-width: 18px;
    text-align: right; font-variant-numeric: tabular-nums; }
  .kind-bullet .blk-marker { font-size: 20px; line-height: 1; padding-top: 4px; }
  .kind-bullet .ce, .kind-numbered .ce { flex: 1; min-width: 0; }
  .kind-code .content { padding: 3px 0; }
  .ce.code, .code-pre {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13.5px;
    background: var(--callout-bg); border: 1px solid var(--callout-border); border-radius: 8px;
    padding: 12px 14px; white-space: pre-wrap; line-height: 1.45; tab-size: 2;
  }
  .kind-image .content { padding: 4px 0; }
  .kind-image img { max-width: 100%; border-radius: 8px; display: block; }
  .img-empty { color: var(--faint); border: 1px dashed var(--border); border-radius: 8px; padding: 14px;
    cursor: pointer; text-align: center; font-size: 13.5px; }
  /* Toggle: a caret + summary; the body lives in following indented sibling blocks is not modeled,
     so a toggle hides/shows its own folded note text on the same block. */
  .kind-toggle .content { display: flex; align-items: flex-start; gap: 6px; }
  .toggle-caret { flex: 0 0 18px; width: 18px; height: 22px; border: none; background: none; cursor: pointer;
    color: var(--muted); display: grid; place-items: center; padding: 0; }
  .toggle-caret svg { width: 12px; height: 12px; transition: transform .12s; }
  .toggle-caret.open svg { transform: rotate(90deg); }
  .kind-toggle .ce { flex: 1; min-width: 0; }

  /* ---------- Drag-to-reorder ---------- */
  .block.dragging { opacity: .4; }
  .block.drop-before { box-shadow: inset 0 2px 0 var(--accent); }
  .block.drop-after { box-shadow: inset 0 -2px 0 var(--accent); }
  .gbtn.handle { cursor: grab; }

  /* ---------- Mobile sidebar toggle ---------- */
  .menu-btn { display: none; border: none; background: none; padding: 5px 8px; border-radius: 6px;
    cursor: pointer; color: var(--muted); }
  .menu-btn svg { width: 20px; height: 20px; }
  .menu-btn:hover { background: var(--hover); color: var(--text); }
  .scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40; }

  /* ---------- Emoji picker search ---------- */
  .emoji-search { width: 100%; box-sizing: border-box; margin-bottom: 6px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font: inherit; font-size: 13px; }
  .emoji-remove { width: 100%; text-align: left; margin-top: 4px; }

  @media (max-width: 760px) {
    .menu-btn { display: grid; place-items: center; }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; width: 84vw; max-width: 300px;
      transform: translateX(-102%); transition: transform .18s ease; box-shadow: 0 0 40px rgba(0,0,0,.25);
    }
    .app.nav-open .sidebar { transform: translateX(0); }
    .app.nav-open .scrim { display: block; }
    .doc { padding: 8px 18px 40vh; }
    .doc-title { font-size: 30px; min-height: 36px; }
    .doc-icon { font-size: 52px; }
    .block { grid-template-columns: 0 1fr; }
    .gutter { display: none; }
    .addblock { margin-left: 0; }
    .crumb { max-width: 130px; }
  }
  .doc-title, .ce, .rtitle, .crumb { overflow-wrap: anywhere; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 6.5h12M9.5 12h8.5M9.5 17.5h6"/>
        </svg>
      </span>
      <span>Noted <span class="sub">· MorphDB</span></span>
    </div>
    <button class="newpage" id="newRoot">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      New page
    </button>
    <div class="section-label">Private</div>
    <nav class="tree" id="tree"></nav>
    <div class="foot">Backed by <strong>MorphDB</strong> · app <code>notion-demo</code></div>
  </aside>

  <main class="main">
    <div class="banner" id="banner"></div>
    <div class="topbar" id="topbar"></div>
    <div id="doc" class="doc"></div>
  </main>
</div>
<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>

<script>
const BASE = location.hostname
  ? `${location.protocol}//${location.hostname}:8787`
  : "http://127.0.0.1:8787";
const APP = "notion-demo";   // this site's MorphDB app key (sent as X-App-Key)

const $ = (id) => document.getElementById(id);

async function api(method, path, body) {
  const res = await fetch(BASE + path, {
    method,
    headers: { "Content-Type": "application/json", "X-App-Key": APP },
    body: body === undefined ? undefined : JSON.stringify(body),
  });
  const data = res.status === 204 ? null : await res.json();
  if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
  return data;
}

let toastTimer;
function showErr(msg) {
  if (/unknown app|no such app/i.test(msg || "")) { showBanner(); return; }
  const t = $("toast"); t.className = "toast"; t.textContent = msg || "Something went wrong";
  t.classList.add("show"); clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3800);
}
// Notion-style "Deleted — Undo" affordance (no native confirm, restorable).
function showUndo(msg, onUndo) {
  const t = $("toast"); t.className = "toast info show";
  t.textContent = msg + " ";
  const btn = document.createElement("button");
  btn.className = "toast-undo"; btn.textContent = "Undo";
  btn.onclick = () => { t.classList.remove("show"); clearTimeout(toastTimer); onUndo(); };
  t.appendChild(btn);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 7000);
}
function showBanner() {
  const b = $("banner");
  b.innerHTML = `This page can't find its backend app. Run <code>morphdb init ` +
    `&lt;this folder&gt;/morphdb.schema.json</code> (or serve the folder over http) and reload.`;
  b.style.display = "block";
}

/* ---------- Self-bootstrap (in-browser `morphdb init`) ---------- */
async function ensureApp() {
  // Probe first so a normal load (app already registered) makes NO failing call:
  // GET /schema returns 404 only when the app is unknown. We POST /app solely in
  // that case, so the console stays clean (no red 409 on every visit).
  try {
    const probe = await fetch(BASE + "/schema", { headers: { "X-App-Key": APP } });
    if (probe.ok) return;                       // app exists — nothing to do
    if (probe.status !== 404) return;           // 400/5xx: surfaced by the first real call
    await fetch(BASE + "/app", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: APP }),
    });
  } catch (_) { /* connection errors surface on the first real call */ }
}
async function ensureSchema() {
  let doc = null;
  try { const r = await fetch("./morphdb.schema.json"); if (r.ok) doc = await r.json(); }
  catch (_) { /* opened via file:// — assume `morphdb init` already ran */ }
  if (!doc || !Array.isArray(doc.types)) return;
  for (const t of doc.types)
    await api("PUT", `/schema/${t.name}`, { merge: true, fields: t.fields || {} });
  for (const t of doc.types)
    if (t.relations && Object.keys(t.relations).length)
      await api("PUT", `/schema/${t.name}`, { merge: true, relations: t.relations });
}

/* ---------- Seed (only when empty) ---------- */
async function mkPage(title, icon, order, parent) {
  const body = { title, icon, order };
  if (parent) body.parent = parent;
  return api("POST", "/objects/page", body);
}
async function mkBlocks(pageGuid, rows) {
  let i = 0;
  for (const r of rows)
    await api("POST", "/objects/block",
      { kind: r.k, text: r.t || "", checked: !!r.c, order: i++, page: pageGuid });
}
async function seedIfEmpty() {
  const { total } = await api("GET", "/objects/page?limit=1");
  if (total > 0) return;

  const gs = await mkPage("Getting started", "📓", 0, null);
  await mkBlocks(gs._guid, [
    { k: "h1", t: "Getting started" },
    { k: "text", t: "Welcome to your workspace. This is Noted, a tiny Notion-style workspace built on MorphDB — pages nest into each other through a self-relation, and every block is its own object." },
    { k: "todo", t: "Open a page from the sidebar", c: true },
    { k: "todo", t: "Hover a page and hit “+” to create a sub-page", c: false },
    { k: "quote", t: "Tip: press Enter at the end of a block to add the next one." },

/* ---------- Serialized writes ----------
   MorphDB has no atomic reorder / insert-at-position primitive, so every insert
   or move is a read-modify-write the client performs. Running them concurrently
   raced (rapid Enter once produced five blocks sharing order=2). We fix it two
   ways: (1) ALL ordering mutations go through this promise queue so they apply
   one-at-a-time against fresh in-memory state, and (2) we order blocks by a
   FRACTIONAL index (midpoint between neighbours) so an insert never has to
   renumber siblings — it writes exactly one new `order`. */
let writeChain = Promise.resolve();
function serialize(fn) {
  const run = writeChain.then(fn, fn);
  writeChain = run.catch(() => {});
  return run;
}
// A spread-out order so there's always room to insert a midpoint between two.
const ORDER_STEP = 1000;
function orderBetween(prev, next) {
  if (prev == null && next == null) return 0;
  if (prev == null) return next - ORDER_STEP;
  if (next == null) return prev + ORDER_STEP;
  return (prev + next) / 2;
}

/* ---------- Inline markdown (survives reload) ----------
   contentEditable shows rendered rich text; we persist it as lightweight
   markdown in the block's `text` field. Cmd+B/I/E therefore round-trips instead
   of silently vanishing on save. */
function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function mdToHtml(md) {
  if (!md) return "";
  const codes = [];
  let s = escHtml(md);
  s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return `${codes.length - 1}`; });
  s = s.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/~~([^~\n]+)~~/g, "<s>$1</s>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  s = s.replace(/(\d+)/g, (m, i) => `<code>${codes[+i]}</code>`);
  s = s.replace(/\n/g, "<br>");
  return s;
}
function htmlToMd(node) {
  let out = "";
  node.childNodes.forEach((n) => {
    if (n.nodeType === 3) { out += n.nodeValue; return; }
    if (n.nodeType !== 1) return;
    const tag = n.tagName, inner = htmlToMd(n);
    if (tag === "BR") out += "\n";
    else if (tag === "STRONG" || tag === "B") out += inner ? "**" + inner + "**" : "";
    else if (tag === "EM" || tag === "I") out += inner ? "*" + inner + "*" : "";
    else if (tag === "CODE") out += inner ? "`" + inner + "`" : "";
    else if (tag === "S" || tag === "STRIKE" || tag === "DEL") out += inner ? "~~" + inner + "~~" : "";
    else if (tag === "DIV" || tag === "P") { if (out && !out.endsWith("\n")) out += "\n"; out += inner; }
    else out += inner;
  });
  return out;
}
// Plain text that keeps line breaks (<br>/<div> -> "\n") for code blocks.
function textWithBreaks(node) {
  let out = "";
  node.childNodes.forEach((n) => {
    if (n.nodeType === 3) { out += n.nodeValue; return; }
    if (n.nodeType !== 1) return;
    if (n.tagName === "BR") { out += "\n"; return; }
    if (n.tagName === "DIV" && out && !out.endsWith("\n")) out += "\n";
    out += textWithBreaks(n);
  });
  return out;
}
// The block text as stored: markdown for rich blocks, raw text for code blocks.
function readEditable(b, d) {
  return b.kind === "code" ? textWithBreaks(d) : htmlToMd(d);
}

async function loadTree() {
  const { objects } = await api("GET", "/objects/page?sort=order&order=asc&limit=500");
  state.pages = objects;
  state.byId = {}; state.childrenMap = {}; state.roots = [];
  for (const p of objects) state.byId[p._guid] = p;
  for (const p of objects) {
    const par = p.parent;                         // a guid string, or null
    if (par && state.byId[par]) (state.childrenMap[par] ||= []).push(p);
    else state.roots.push(p);
  }
  renderSidebar();
}

function renderSidebar() {
  const tree = $("tree");
  tree.innerHTML = "";
  if (!state.roots.length) {
    tree.innerHTML = '<div class="empty-tree">No pages yet — create one above.</div>';
    return;
  }
  for (const r of state.roots) tree.appendChild(rowEl(r, 0));
}

function rowEl(p, depth) {
  const frag = document.createDocumentFragment();
  const row = document.createElement("div");
  row.className = "row" + (p._guid === state.currentPageGuid ? " active" : "");

  if (kids.length && state.expanded.has(p._guid))

function toggleExpand(guid) {

}
let suppressHash = false;
window.addEventListener("hashchange", () => {
  if (suppressHash) { suppressHash = false; return; }
  const g = location.hash.slice(1);
  if (g && state.byId[g] && g !== state.currentPageGuid) selectPage(g);
});

async function loadDoc(guid) {
  try {
    // include= hydrates the page's blocks in a single round trip
    const page = await api("GET", `/objects/page/${guid}?include=blocks`);
    state.byId[guid] = Object.assign(state.byId[guid] || {}, {
      title: page.title, icon: page.icon, order: page.order, parent: page.parent,
    });
    state.blocks = (page.blocks || []).slice().sort((a, b) => a.order - b.order);
    renderDoc();
  } catch (e) { showErr(e.message); }
}

function crumbsFor(guid) {

  handle.className = "gbtn handle"; handle.innerHTML = ICONS.grip; handle.title = "Drag to move · click for options";
  handle.tabIndex = -1;
  handle.onclick = (e) => { e.stopPropagation(); openBlockMenu(b, handle); };
  wireDrag(handle, wrap, b);
  gutter.append(plus, handle);

  const content = document.createElement("div"); content.className = "content";
  if (b.kind === "divider") {
    content.appendChild(document.createElement("hr"));
  } else if (b.kind === "image") {

      img.src = b.text; img.alt = ""; img.onerror = () => { img.replaceWith(imgPlaceholder(b)); };
      content.appendChild(img);
    } else {

    }
  } else if (b.kind === "todo") {

  } else if (b.kind === "bullet") {
    const m = document.createElement("span"); m.className = "blk-marker"; m.textContent = "•";
    content.append(m, editable(b));
  } else if (b.kind === "numbered") {
    const m = document.createElement("span"); m.className = "blk-marker"; m.textContent = (num || 1) + ".";
    content.append(m, editable(b));
  } else if (b.kind === "toggle") {

function imgPlaceholder(b) {
  const ph = document.createElement("div"); ph.className = "img-empty";
  ph.textContent = "🖼  Add an image — click to paste a URL";
  ph.onclick = () => {
    const url = prompt("Image URL:", b.text || "");
    if (url == null) return;
    b.text = url.trim();
    serialize(async () => { await patchBlock(b._guid, { text: b.text }); await loadDoc(state.currentPageGuid); });
  };
  return ph;
}

function editable(b) {
  const d = document.createElement("div");
  d.className = "ce " + b.kind; d.contentEditable = "true"; d.spellcheck = false;
  d.dataset.ph = PH[b.kind] || "";
  if (b.kind === "code") d.textContent = b.text || "";
  else d.innerHTML = mdToHtml(b.text || "");
  d.onblur = () => {
    const t = readEditable(b, d);
    if (t !== (b.text || "")) { b.text = t; patchBlock(b._guid, { text: t }); }
  };
  d.oninput = () => { if (b.kind === "code") return; detectMarkdown(b, d); detectSlash(b, d); };
  d.onkeydown = (e) => onBlockKey(e, b, d);
  if (state.focusGuid === b._guid) {
    state.focusGuid = null;
    const off = state.focusOffset; state.focusOffset = null;
    requestAnimationFrame(() => {
      if (off == null || off === "end") placeCaretEnd(d);
      else placeCaretAt(d, off);
    });
  }
  return d;
}

// kinds whose Enter continues the same kind (list-like). Everything else → text.
const LIST_KINDS = new Set(["todo", "bullet", "numbered"]);

function onBlockKey(e, b, d) {
  // When the slash menu is open on this block, let it own the nav keys.
  if (slashState && slashState.guid === b._guid && handleSlashKey(e)) return;

  // Inline formatting — round-trips as markdown, so it survives reload.
  if ((e.metaKey || e.ctrlKey) && !e.altKey) {
    const k = e.key.toLowerCase();
    if (b.kind === "code") return;                  // code blocks are literal
    if (k === "b") { e.preventDefault(); applyFormat(d, b, "bold"); return; }
    if (k === "i") { e.preventDefault(); applyFormat(d, b, "italic"); return; }
    if (k === "e") { e.preventDefault(); applyFormat(d, b, "code"); return; }
    if (k === "s" && e.shiftKey) { e.preventDefault(); applyFormat(d, b, "strike"); return; }
  }

  if (e.key === "Enter" && !e.shiftKey) {
    // In a code block, Enter inserts a newline (it's literal text), not a new block.
    if (b.kind === "code") return;
    e.preventDefault();
    const atEnd = caretAtEnd(d);
    (async () => {
      try {
        const cur = readEditable(b, d);
        // Enter on an EMPTY list item exits the list: turn it into a plain text block.
        if (LIST_KINDS.has(b.kind) && cur === "") { b.text = ""; await changeKind(b._guid, "text"); return; }
        const contKind = LIST_KINDS.has(b.kind) ? b.kind : "text";
        if (atEnd) {
          if (cur !== (b.text || "")) { b.text = cur; await patchBlock(b._guid, { text: cur }); }
          await addBlockAfter(b._guid, contKind);
        } else {
          const [head, tail] = splitEditable(d, b);  // split block at the caret
          b.text = head;
          await patchBlock(b._guid, { text: head });
          await addBlockAfter(b._guid, contKind, tail);
        }
      } catch (err) { showErr(err.message); }
    })();
    return;
  }

  if (e.key === "Backspace" && caretAtStart()) {
    const cur = readEditable(b, d);
    if (cur === "") { e.preventDefault(); deleteBlock(b._guid, true); return; }
    // Backspace at the START of a non-empty block merges it into the previous block.
    const i = state.blocks.findIndex((x) => x._guid === b._guid);
    if (i > 0) {
      const prev = state.blocks[i - 1];
      if (prev.kind === "divider" || prev.kind === "image") return;  // nothing to merge text into
      e.preventDefault();
      mergeIntoPrev(b, prev, cur);
    }
    return;
  }

  if (e.key === "ArrowUp" && caretAtStart()) { if (focusSibling(b, -1)) e.preventDefault(); return; }
  if (e.key === "ArrowDown" && caretAtEnd(d)) { if (focusSibling(b, +1)) e.preventDefault(); return; }
  // Tab moves between blocks instead of leaving the editor / hitting gutter buttons.
  if (e.key === "Tab") { e.preventDefault(); focusSibling(b, e.shiftKey ? -1 : +1); return; }
}

/* ---------- Inline formatting ---------- */
function applyFormat(d, b, which) {
  const sel = getSelection();
  if (!sel.rangeCount) return;
  if (which === "code") { wrapSelection(d, "code"); }
  else {
    try { document.execCommand("styleWithCSS", false, false); } catch (_) {}
    document.execCommand(which === "bold" ? "bold" : which === "italic" ? "italic" : "strikeThrough");
  }
  const t = readEditable(b, d);
  if (t !== (b.text || "")) { b.text = t; patchBlock(b._guid, { text: t }); }
}
function wrapSelection(d, tag) {
  const sel = getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  const r = sel.getRangeAt(0);
  if (!d.contains(r.commonAncestorContainer)) return;
  const el = document.createElement(tag);
  el.textContent = r.toString();
  r.deleteContents(); r.insertNode(el);
  sel.removeAllRanges();
  const nr = document.createRange(); nr.setStartAfter(el); nr.collapse(true); sel.addRange(nr);
}

// Split the editable at the caret into [headMd, tailMd], preserving inline marks.
function splitEditable(d, b) {
  const sel = getSelection();
  const r = sel.getRangeAt(0);
  const before = document.createRange(); before.selectNodeContents(d); before.setEnd(r.endContainer, r.endOffset);
  const after = document.createRange(); after.selectNodeContents(d); after.setStart(r.endContainer, r.endOffset);
  const h = document.createElement("div"); h.appendChild(before.cloneContents());
  const t = document.createElement("div"); t.appendChild(after.cloneContents());
  if (b.kind === "code") return [textWithBreaks(h), textWithBreaks(t)];
  return [htmlToMd(h), htmlToMd(t)];
}

async function mergeIntoPrev(b, prev, cur) {
  serialize(async () => {
    try {
      const sep = prev.kind === "code" ? "\n" : "";
      const merged = (prev.text || "") + sep + cur;
      // Caret goes at the join, measured in VISIBLE chars (markdown markup is hidden).
      let caretAt;
      if (prev.kind === "code") caretAt = (prev.text || "").length + sep.length;
      else { const tmp = document.createElement("div"); tmp.innerHTML = mdToHtml(prev.text || ""); caretAt = tmp.textContent.length; }
      prev.text = merged;
      await patchBlock(prev._guid, { text: merged });
      await api("DELETE", `/objects/block/${b._guid}`);
      state.focusGuid = prev._guid;
      state.focusOffset = caretAt;
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

/* ---------- Block-to-block caret navigation ---------- */
function focusSibling(b, dir) {
  const i = state.blocks.findIndex((x) => x._guid === b._guid);
  const j = i + dir;
  if (j < 0 || j >= state.blocks.length) return false;
  const ne = document.querySelector(`.block[data-guid="${state.blocks[j]._guid}"] .ce`);
  if (!ne) return false;
  dir < 0 ? placeCaretEnd(ne) : placeCaretStart(ne);
  return true;
}

/* ---------- Block mutations ---------- */
// Serialized so concurrent inserts never collide; fractional order so an insert
// writes ONE new `order` (no sibling renumbering, no race).
function addBlockAfter(afterGuid, kind = "text", text = "") {
  return serialize(async () => {
    try {
      const blocks = state.blocks;
      let prev, next;
      if (afterGuid) {
        const i = blocks.findIndex((x) => x._guid === afterGuid);
        prev = blocks[i] ? blocks[i].order : null;
        next = blocks[i + 1] ? blocks[i + 1].order : null;
      } else {
        prev = blocks.length ? blocks[blocks.length - 1].order : null;
        next = null;
      }
      const newOrder = orderBetween(prev, next);
      const created = await api("POST", "/objects/block",
        { kind, text, checked: false, order: newOrder, page: state.currentPageGuid });
      // Notion: a divider has no caret — drop a fresh text block under it to type in.
      if (kind === "divider") {
        const trail = await api("POST", "/objects/block",
          { kind: "text", text: "", checked: false, order: orderBetween(newOrder, next), page: state.currentPageGuid });
        state.focusGuid = trail._guid;
      } else {
        state.focusGuid = created._guid;
      }
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

function changeKind(guid, kind) {
  return serialize(async () => {
    try {
      await api("PATCH", `/objects/block/${guid}`, { kind });
      state.focusGuid = kind === "divider" ? null : guid;
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

async function toggleChecked(guid, val) {
  try {
    await api("PATCH", `/objects/block/${guid}`, { checked: val });
    const b = state.blocks.find((x) => x._guid === guid); if (b) b.checked = val;
    const row = document.querySelector(`.block[data-guid="${guid}"]`);
    if (row) row.classList.toggle("checked", val);
  } catch (e) { showErr(e.message); }
}

function moveBlock(guid, dir) {
  return serialize(async () => {
    try {
      const i = state.blocks.findIndex((x) => x._guid === guid);
      const j = i + dir;
      if (j < 0 || j >= state.blocks.length) return;
      const a = state.blocks[i], b = state.blocks[j];
      await api("PATCH", `/objects/block/${a._guid}`, { order: b.order });
      await api("PATCH", `/objects/block/${b._guid}`, { order: a.order });
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

// Drag-to-reorder: drop `guid` just before the block at target index `to`
// (computed from where the drop landed). One fractional write, serialized.
function reorderTo(guid, to) {
  return serialize(async () => {
    try {
      const cur = state.blocks.slice();
      const from = cur.findIndex((x) => x._guid === guid);
      if (from < 0 || to < 0 || to > cur.length) return;
      if (to === from || to === from + 1) return;     // no-op
      const moving = cur[from];
      const rest = cur.filter((x) => x._guid !== guid);
      const insertAt = to > from ? to - 1 : to;
      const prev = rest[insertAt - 1] ? rest[insertAt - 1].order : null;
      const next = rest[insertAt] ? rest[insertAt].order : null;
      await api("PATCH", `/objects/block/${moving._guid}`, { order: orderBetween(prev, next) });
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

function deleteBlock(guid, focusPrev) {
  return serialize(async () => {
    try {
      const i = state.blocks.findIndex((x) => x._guid === guid);
      if (focusPrev && i > 0) { state.focusGuid = state.blocks[i - 1]._guid; state.focusOffset = "end"; }
      await api("DELETE", `/objects/block/${guid}`);
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

/* ---------- Drag wiring (HTML5 drag from the grip handle) ---------- */
let dragGuid = null;
function clearDropMarks() {
  document.querySelectorAll(".block.drop-before,.block.drop-after,.block.dragging")
    .forEach((el) => el.classList.remove("drop-before", "drop-after", "dragging"));
}
function wireDrag(handle, wrap, b) {
  handle.setAttribute("draggable", "true");
  handle.addEventListener("dragstart", (e) => {
    dragGuid = b._guid; wrap.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", b._guid); } catch (_) {}
    try { e.dataTransfer.setDragImage(wrap, 10, 10); } catch (_) {}
  });
  handle.addEventListener("dragend", () => { dragGuid = null; clearDropMarks(); });
  wrap.addEventListener("dragover", (e) => {
    if (!dragGuid || dragGuid === b._guid) return;
    e.preventDefault(); e.dataTransfer.dropEffect = "move";
    const r = wrap.getBoundingClientRect();
    const below = e.clientY > r.top + r.height / 2;
    wrap.classList.toggle("drop-after", below);
    wrap.classList.toggle("drop-before", !below);
  });
  wrap.addEventListener("dragleave", () => wrap.classList.remove("drop-before", "drop-after"));
  wrap.addEventListener("drop", (e) => {
    if (!dragGuid || dragGuid === b._guid) return;
    e.preventDefault();
    const r = wrap.getBoundingClientRect();
    const below = e.clientY > r.top + r.height / 2;
    const idx = state.blocks.findIndex((x) => x._guid === b._guid);
    const to = below ? idx + 1 : idx;
    const g = dragGuid; clearDropMarks(); dragGuid = null;
    reorderTo(g, to);
  });
}

async function patchBlock(guid, patch) {
  try { await api("PATCH", `/objects/block/${guid}`, patch); }
  catch (e) { showErr(e.message); }
}

/* ---------- Page mutations ---------- */
async function newPage(parentGuid) {
  try {
    const sibs = parentGuid ? (state.childrenMap[parentGuid] || []) : state.roots;
    const order = sibs.length ? Math.max(...sibs.map((s) => s.order)) + 1 : 0;
    const body = { title: "", icon: "📄", order };
    if (parentGuid) body.parent = parentGuid;
    const created = await api("POST", "/objects/page", body);
    if (parentGuid) state.expanded.add(parentGuid);
    await loadTree();
    selectPage(created._guid, true);
  } catch (e) { showErr(e.message); }
}

async function patchPage(guid, patch) {
  try {
    await api("PATCH", `/objects/page/${guid}`, patch);
    Object.assign(state.byId[guid], patch);
    renderSidebar();
    if (guid === state.currentPageGuid && "icon" in patch) {
      const di = document.querySelector(".doc-icon"); if (di) di.textContent = patch.icon;
      renderTopbar();
    }
    if ("title" in patch) renderTopbar();
  } catch (e) { showErr(e.message); }
}

function collectSubtree(guid) {
  const out = [guid];
  for (const k of (state.childrenMap[guid] || [])) out.push(...collectSubtree(k._guid));
  return out;
}

// No native confirm and no irreversible loss: snapshot the subtree, hard-delete
// (the backend has no cascade), then offer Undo that re-creates it.
// LIMITATION: delete + restore are multi-call and non-atomic (see notes); a
// mid-way failure can leave a partial subtree. We serialize the work and restore
// from a full in-memory snapshot to make that as safe as the API allows.
async function deletePage(guid) {
  const p = state.byId[guid];
  const ids = collectSubtree(guid);
  let snap;
  try {
    snap = [];
    for (const id of ids) {
      const pg = state.byId[id] || await api("GET", `/objects/page/${id}`);
      const { objects } = await api("GET", `/objects/block?page=${id}&sort=order&order=asc&limit=500`);
      snap.push({ oldGuid: id, oldParent: pg.parent || null,
        page: { title: pg.title || "", icon: pg.icon || "📄", order: pg.order || 0 },
        blocks: objects.map((b) => ({ kind: b.kind, text: b.text || "", checked: !!b.checked, order: b.order })) });
    }
    for (const id of ids) {
      const { objects } = await api("GET", `/objects/block?page=${id}&limit=500`);
      for (const b of objects) await api("DELETE", `/objects/block/${b._guid}`);
      await api("DELETE", `/objects/page/${id}`);
    }
    const wipedCurrent = ids.includes(state.currentPageGuid);
    await loadTree();
    if (wipedCurrent) {
      const next = state.roots[0];
      if (next) selectPage(next._guid);
      else { state.currentPageGuid = null; suppressHash = true; location.hash = ""; renderDoc(); }
    }
    showUndo(`Deleted “${p?.title || "Untitled"}”`, () => restorePages(snap));
  } catch (e) { showErr(e.message); }
}

// Re-create a snapshot (pages parent-first, then their blocks). New guids.
async function restorePages(snap) {
  try {
    const map = {};   // oldGuid -> newGuid
    for (const s of snap) {
      const body = { ...s.page };
      const parent = map[s.oldParent] || (state.byId[s.oldParent] ? s.oldParent : null);
      if (parent) body.parent = parent;
      const np = await api("POST", "/objects/page", body);
      map[s.oldGuid] = np._guid;
      for (const b of s.blocks)
        await api("POST", "/objects/block", { ...b, page: np._guid });
    }
    await loadTree();
    const first = snap[0] && map[snap[0].oldGuid];
    if (first) selectPage(first);
  } catch (e) { showErr(e.message); }
}

/* ---------- Floating menus ---------- */
let menuEl = null;
function closeMenu() { if (menuEl) { menuEl.remove(); menuEl = null; } }
function openMenu(anchor, build) {
  closeMenu();
  const m = document.createElement("div"); m.className = "menu";
  build(m);
  document.body.appendChild(m);
  const r = anchor.getBoundingClientRect();
  let top = r.bottom + 4, left = r.left;
  const mr = m.getBoundingClientRect();
  if (left + mr.width > innerWidth - 8) left = innerWidth - mr.width - 8;
  if (top + mr.height > innerHeight - 8) top = Math.max(8, r.top - mr.height - 4);
  m.style.top = top + "px"; m.style.left = Math.max(8, left) + "px";
  m.onclick = (e) => e.stopPropagation();
  menuEl = m;
}

function openBlockMenu(b, anchor) {
  openMenu(anchor, (m) => {
    const lbl = document.createElement("div"); lbl.className = "mlabel"; lbl.textContent = "Turn into";
    m.appendChild(lbl);
    for (const [k, ic, name] of KINDS) {
      const it = document.createElement("button"); it.className = "mitem";
      it.innerHTML = `<span class="mi"></span><span></span>`;
      it.querySelector(".mi").textContent = ic;
      it.lastChild.textContent = name;
      if (k === b.kind) it.style.fontWeight = "600";
      it.onclick = () => { closeMenu(); if (k !== b.kind) changeKind(b._guid, k); };
      m.appendChild(it);
    }
    m.appendChild(sep());
    m.appendChild(mitem("↑", "Move up", () => { closeMenu(); moveBlock(b._guid, -1); }));
    m.appendChild(mitem("↓", "Move down", () => { closeMenu(); moveBlock(b._guid, +1); }));
    m.appendChild(mitem(ICONS.trash, "Delete", () => { closeMenu(); deleteBlock(b._guid, false); }, true, true));
  });
}

function openEmojiPicker(anchor) {
  const guid = state.currentPageGuid;
  openMenu(anchor, (m) => {
    const search = document.createElement("input");
    search.className = "emoji-search"; search.placeholder = "Search emoji…"; search.spellcheck = false;
    const grid = document.createElement("div"); grid.className = "emoji-grid";
    const draw = (q) => {
      grid.innerHTML = "";
      const ql = q.trim().toLowerCase();
      const list = EMOJIS.filter((e) => !ql || e === ql || (EMOJI_NAMES[e] || "").includes(ql));
      for (const e of list) {
        const btn = document.createElement("button"); btn.textContent = e; btn.title = EMOJI_NAMES[e] || "";
        btn.onclick = () => { closeMenu(); patchPage(guid, { icon: e }); };
        grid.appendChild(btn);
      }
      if (!list.length) { const n = document.createElement("div"); n.className = "mnone"; n.style.padding = "8px 4px"; n.style.color = "var(--faint)"; n.textContent = "No emoji"; grid.appendChild(n); }
    };
    search.oninput = () => draw(search.value);
    draw("");
    const rm = mitem("⌫", "Remove icon", () => { closeMenu(); patchPage(guid, { icon: "📄" }); });
    rm.classList.add("emoji-remove");
    m.append(search, grid, sep(), rm);
    requestAnimationFrame(() => search.focus());
  });
}

function mitem(icon, label, onClick, danger, isSvg) {
  const it = document.createElement("button");
  it.className = "mitem" + (danger ? " danger" : "");
  const mi = document.createElement("span"); mi.className = "mi";
  if (isSvg) mi.innerHTML = icon; else mi.textContent = icon;
  const lb = document.createElement("span"); lb.textContent = label;
  it.append(mi, lb); it.onclick = onClick; return it;
}
function sep() { const s = document.createElement("div"); s.className = "msep"; return s; }

/* ---------- Slash command menu ---------- */
// Marquee Notion interaction: type "/" to summon a command palette that turns
// the current block into the chosen kind. State lives in slashState while open.
let slashState = null;

function matchSlash(item, q) {
  if (!q) return true;
  const hay = (item[2] + " " + item[0] + " " + item[4]).toLowerCase();
  return hay.includes(q.toLowerCase());
}

// Offset of the caret within el's plain text (these editables hold a single run).
function caretOffset(el) {
  const s = getSelection();
  if (!s.rangeCount) return el.textContent.length;
  const r = s.getRangeAt(0).cloneRange();
  const pre = r.cloneRange();
  pre.selectNodeContents(el);
  pre.setEnd(r.endContainer, r.endOffset);
  return pre.toString().length;
}

/* ---------- Markdown shortcuts ----------
   Notion-style: at the START of a block, a shorthand + space converts the block.
   We only fire when the block holds nothing but the trigger. */
const MD_RULES = [
  [/^# $/, "h1"], [/^## $/, "h2"], [/^### $/, "h2"],
  [/^[-*+] $/, "bullet"], [/^1\. $/, "numbered"],
  [/^\[\] $/, "todo"], [/^\[\s\] $/, "todo"],
  [/^> $/, "quote"], [/^" $/, "quote"],
  [/^```$/, "code"], [/^---$/, "divider"], [/^\*\*\*$/, "divider"],
];
function detectMarkdown(b, d) {
  if (slashState) return;
  const txt = d.textContent;
  for (const [re, kind] of MD_RULES) {
    if (!re.test(txt)) continue;
    if (kind === b.kind) return;
    serialize(async () => {
      try {
        await api("PATCH", `/objects/block/${b._guid}`, { text: "", kind });
        b.text = "";
        if (kind === "divider") {                 // dividers can't hold a caret → add one below
          const i = state.blocks.findIndex((x) => x._guid === b._guid);
          const next = state.blocks[i + 1] ? state.blocks[i + 1].order : null;
          const trail = await api("POST", "/objects/block",
            { kind: "text", text: "", checked: false, order: orderBetween(b.order, next), page: state.currentPageGuid });
          state.focusGuid = trail._guid;
        } else {
          state.focusGuid = b._guid;
        }
        await loadDoc(state.currentPageGuid);
      } catch (e) { showErr(e.message); }
    });
    return;
  }
}

// Run on every input: open/refresh the menu when a "/command" is being typed.
function detectSlash(b, d) {
  const caret = caretOffset(d);
  const before = d.textContent.slice(0, caret);
  const m = before.match(/(?:^|\s)\/([^\/\s]*)$/);   // "/" at start or after space, query to caret
  if (!m) { closeSlash(); return; }
  openSlash(b, d, m[1], caret - m[1].length - 1);
}

function openSlash(b, d, query, slashStart) {
  const items = SLASH.filter((it) => matchSlash(it, query));
  if (!items.length) { closeSlash(); return; }       // nothing matches → behave like plain typing
  if (!slashState || slashState.guid !== b._guid) {
    closeSlash();
    const m = document.createElement("div");
    m.className = "menu slash-menu";
    m.addEventListener("mousedown", (e) => e.preventDefault());  // keep caret in the block
    m.onclick = (e) => e.stopPropagation();
    document.body.appendChild(m);
    slashState = { guid: b._guid, block: b, el: d, menu: m };
  }
  Object.assign(slashState, { items, query, slashStart, index: 0 });
  renderSlashMenu();
  positionSlashMenu();
}

function renderSlashMenu() {
  const st = slashState, m = st.menu; m.innerHTML = "";
  const lbl = document.createElement("div"); lbl.className = "mlabel";
  lbl.textContent = "Basic blocks"; m.appendChild(lbl);
  st.items.forEach((it, i) => {
    const [kind, ic, name, desc] = it;
    const btn = document.createElement("button");
    btn.className = "mitem" + (i === st.index ? " sel" : "");
    const mi = document.createElement("span"); mi.className = "mi"; mi.textContent = ic;
    const tx = document.createElement("span"); tx.className = "mtext";
    const nm = document.createElement("span"); nm.className = "mname"; nm.textContent = name;
    const ds = document.createElement("span"); ds.className = "mdesc"; ds.textContent = desc;
    tx.append(nm, ds); btn.append(mi, tx);
    btn.onmouseenter = () => { st.index = i; renderSlashSel(); };
    btn.onclick = () => chooseSlash(kind);
    m.appendChild(btn);
  });
}

function renderSlashSel() {
  const items = slashState.menu.querySelectorAll(".mitem");
  items.forEach((el, i) => el.classList.toggle("sel", i === slashState.index));
  const cur = items[slashState.index];
  if (cur) cur.scrollIntoView({ block: "nearest" });
}

function positionSlashMenu() {
  const st = slashState, m = st.menu;
  let rect;
  const s = getSelection();
  if (s.rangeCount) rect = s.getRangeAt(0).getBoundingClientRect();
  if (!rect || (!rect.width && !rect.height && !rect.top)) rect = st.el.getBoundingClientRect();
  const mr = m.getBoundingClientRect();
  let top = rect.bottom + 6, left = rect.left;
  if (left + mr.width > innerWidth - 8) left = innerWidth - mr.width - 8;
  if (top + mr.height > innerHeight - 8) top = Math.max(8, rect.top - mr.height - 6);
  m.style.top = top + "px"; m.style.left = Math.max(8, left) + "px";
}

// Returns true when it consumed the key (so onBlockKey stops).
function handleSlashKey(e) {
  const st = slashState, n = st.items.length;
  if (e.key === "ArrowDown") { e.preventDefault(); st.index = (st.index + 1) % n; renderSlashSel(); return true; }
  if (e.key === "ArrowUp")   { e.preventDefault(); st.index = (st.index - 1 + n) % n; renderSlashSel(); return true; }
  if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); chooseSlash(st.items[st.index][0]); return true; }
  if (e.key === "Escape")    { e.preventDefault(); closeSlash(); return true; }
  return false;
}

function chooseSlash(kind) {
  const st = slashState; if (!st) return;
  const b = st.block, d = st.el;
  const text = d.textContent;
  let stripped = text.slice(0, st.slashStart) + text.slice(st.slashStart + 1 + st.query.length);
  closeSlash();
  // Image asks for a URL up front (stored in the block's text field).
  if (kind === "image") {
    const url = prompt("Image URL:", "");
    stripped = url ? url.trim() : "";
  }
  serialize(async () => {
    try {
      b.text = stripped;
      await api("PATCH", `/objects/block/${b._guid}`, { text: stripped, kind });
      if (kind === "divider") {                   // divider has no caret → trailing text block
        const i = state.blocks.findIndex((x) => x._guid === b._guid);
        const next = state.blocks[i + 1] ? state.blocks[i + 1].order : null;
        const trail = await api("POST", "/objects/block",
          { kind: "text", text: "", checked: false, order: orderBetween(b.order, next), page: state.currentPageGuid });
        state.focusGuid = trail._guid;
      } else {
        state.focusGuid = (kind === "image" && stripped) ? null : b._guid;
      }
      await loadDoc(state.currentPageGuid);
    } catch (e) { showErr(e.message); }
  });
}

function closeSlash() { if (slashState) { slashState.menu.remove(); slashState = null; } }

document.addEventListener("click", () => { closeMenu(); closeSlash(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeMenu(); closeSlash(); } });

/* ---------- Caret helpers ---------- */
function placeCaretEnd(el) {
  if (!el) return;
  el.focus();
  const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
  const s = getSelection(); s.removeAllRanges(); s.addRange(r);
}
function placeCaretStart(el) {
  if (!el) return;
  el.focus();
  const r = document.createRange(); r.selectNodeContents(el); r.collapse(true);
  const s = getSelection(); s.removeAllRanges(); s.addRange(r);
}
// Place the caret after `off` visible characters (walks text nodes).
function placeCaretAt(el, off) {
  el.focus();
  let remain = off, target = el, toff = 0;
  const walk = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  let node, placed = false;
  while ((node = walk.nextNode())) {
    const len = node.nodeValue.length;
    if (remain <= len) { target = node; toff = remain; placed = true; break; }
    remain -= len;
  }
  const s = getSelection(); const r = document.createRange();
  if (placed) { r.setStart(target, toff); r.collapse(true); }
  else { r.selectNodeContents(el); r.collapse(false); }
  s.removeAllRanges(); s.addRange(r);
}
// Caret-at-start / -at-end of the editable, robust to nested formatting nodes.
function caretAtStart() {
  const s = getSelection();
  if (!s.rangeCount) return false;
  const r = s.getRangeAt(0);
  if (!r.collapsed) return false;
  const test = document.createRange();
  const ce = (r.startContainer.nodeType === 1 ? r.startContainer : r.startContainer.parentElement).closest(".ce");
  if (!ce) return r.startOffset === 0;
  test.selectNodeContents(ce); test.setEnd(r.startContainer, r.startOffset);
  return test.toString().length === 0;
}
function caretAtEnd(el) {
  const s = getSelection();
  if (!s.rangeCount) return false;
  const r = s.getRangeAt(0);
  if (!r.collapsed) return false;
  if (el && !el.contains(r.endContainer)) return false;
  const test = document.createRange();
  test.selectNodeContents(el); test.setStart(r.endContainer, r.endOffset);
  return test.toString().length === 0;
}

/* ---------- Wire up + boot ---------- */
$("newRoot").onclick = () => newPage(null);
$("scrim").onclick = () => document.querySelector(".app").classList.remove("nav-open");

// Expand the chain of ancestors so a deep-linked page is visible in the tree.
function expandAncestors(guid) {
  let g = state.byId[guid]?.parent;
  while (g && state.byId[g]) { state.expanded.add(g); g = state.byId[g].parent; }
}

(async () => {
  try {
    await ensureApp();
    await ensureSchema();
    await seedIfEmpty();
  } catch (e) {
    showErr("Could not reach MorphDB at " + BASE + " — is it running? (" + e.message + ")");
    return;
  }
  try {
    await loadTree();
    // First load: expand every page that has children, then open a page.
    for (const p of state.pages)
      if ((state.childrenMap[p._guid] || []).length) state.expanded.add(p._guid);
    // Restore the deep-linked page from the URL hash, else open the first page.
    const hashGuid = location.hash.slice(1);
    const start = (hashGuid && state.byId[hashGuid]) ? hashGuid : state.roots[0]?._guid;
    if (start) { expandAncestors(start); renderSidebar(); selectPage(start); }
    else { renderSidebar(); renderEmptyDoc(); }
  } catch (e) { showErr(e.message); }
})();
</script>
