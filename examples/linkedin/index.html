<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MorphDB · Linkup — a LinkedIn-style example</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f2ee;
    --card: #ffffff;
    --text: #1c1d1f;
    --muted: #5f6368;
    --faint: #8a8d91;
    --line: #e6e4e0;
    --brand: #0a66c2;
    --brand-dk: #004182;
    --brand-soft: #e8f0fb;
    --hover: #eef3f8;
    --ok: #057642;
    --shadow: 0 1px 2px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1c1e;
      --card: #25272a;
      --text: #e9eaec;
      --muted: #a6abb1;
      --faint: #80858b;
      --line: #383b3f;
      --brand: #70b5f9;
      --brand-dk: #4a93e0;
      --brand-soft: #1f2c3a;
      --hover: #2d3033;
      --ok: #4cc38a;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font: 14px/1.45 -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  button { font: inherit; cursor: pointer; }

  /* ---- top bar ---- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    box-shadow: 0 1px 0 rgba(0,0,0,.02);
  }
  .hdr {
    max-width: 1128px; margin: 0 auto; padding: 0 16px;
    height: 54px; display: flex; align-items: center; gap: 12px;
  }
  .logo {
    width: 34px; height: 34px; border-radius: 7px; flex: none;
    background: var(--brand); color: #fff; font-weight: 800; font-size: 19px;
    display: grid; place-items: center; letter-spacing: -1px;
  }
  .hdr h1 { font-size: 15px; margin: 0; font-weight: 700; }
  .hdr h1 span { color: var(--muted); font-weight: 500; }
  .hdr .spacer { flex: 1; }
  .me-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--bg);
  }
  .me-chip .avatar { width: 28px; height: 28px; font-size: 11px; }
  .me-chip b { font-size: 13px; }
  .me-chip small { color: var(--muted); display: block; font-size: 11px; }

  /* ---- layout ---- */
  main {
    max-width: 1128px; margin: 22px auto; padding: 0 16px;
    display: grid; grid-template-columns: 250px 1fr 312px; gap: 24px;
    align-items: start;
  }
  .col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .sticky { position: sticky; top: 74px; }
  @media (max-width: 980px) {
    main { grid-template-columns: 1fr; }
    .sticky { position: static; }
    .col-right { order: 3; }
  }

  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; box-shadow: var(--shadow); overflow: hidden;
  }
  .card .pad { padding: 16px; }
  .card h2 {
    margin: 0; padding: 14px 16px; font-size: 15px; font-weight: 700;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
  }
  .card h2 .count {
    margin-left: auto; font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 999px; padding: 1px 9px;
  }

  /* ---- avatars ---- */
  .avatar {
    flex: none; width: 48px; height: 48px; border-radius: 50%;
    display: grid; place-items: center; color: #fff;
    font-weight: 700; font-size: 16px; letter-spacing: .3px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
  }

  /* ---- profile card ---- */
  .profile .banner-strip { height: 56px; background: linear-gradient(120deg, var(--brand), var(--brand-dk)); }
  .profile .pad { padding-top: 0; text-align: center; }
  .profile .avatar { width: 72px; height: 72px; font-size: 24px; margin: -36px auto 8px; border: 3px solid var(--card); }
  .profile .pname { font-size: 18px; font-weight: 700; }
  .profile .phead { color: var(--text); margin-top: 2px; }
  .profile .ploc { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .profile .about { color: var(--muted); font-size: 13px; margin-top: 10px; text-align: left; line-height: 1.5; }
  .stats { display: flex; border-top: 1px solid var(--line); margin-top: 14px; }
  .stats div { flex: 1; padding: 10px 6px; }
  .stats div + div { border-left: 1px solid var(--line); }
  .stats b { display: block; color: var(--brand); font-size: 15px; }
  .stats span { color: var(--muted); font-size: 12px; }

  /* ---- person rows ---- */
  .prow { display: flex; align-items: center; gap: 10px; padding: 10px 16px; }
  .prow + .prow { border-top: 1px solid var(--line); }
  .prow .avatar { width: 40px; height: 40px; font-size: 14px; }
  .prow .meta { min-width: 0; flex: 1; }
  .prow .meta b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prow .meta small { color: var(--muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---- buttons ---- */
  .btn {
    border: 1.5px solid var(--brand); color: var(--brand); background: transparent;
    border-radius: 999px; padding: 5px 14px; font-weight: 600; font-size: 13px;
    white-space: nowrap; transition: background .12s;
  }
  .btn:hover { background: var(--brand-soft); }
  .btn.solid { background: var(--brand); color: #fff; }
  .btn.solid:hover { background: var(--brand-dk); }
  .btn.ghost { border-color: var(--line); color: var(--muted); }
  .btn.ghost:hover { background: var(--hover); border-color: var(--faint); }
  .btn small { font-size: 13px; }

  /* ---- composer ---- */
  .composer { display: flex; gap: 12px; align-items: flex-start; }
  .composer .avatar { width: 48px; height: 48px; font-size: 16px; }
  .composer .grow { flex: 1; }
  .composer textarea {
    width: 100%; resize: vertical; min-height: 46px; max-height: 220px;
    border: 1px solid var(--line); border-radius: 22px; padding: 12px 16px;
    font: inherit; background: var(--bg); color: var(--text);
  }
  .composer textarea:focus { outline: none; border-color: var(--brand); border-radius: 16px; min-height: 70px; }
  .composer .actions { display: flex; justify-content: flex-end; margin-top: 8px; }

  /* ---- feed ---- */
  .feed { display: flex; flex-direction: column; gap: 12px; }
  .post .head { display: flex; gap: 10px; align-items: center; padding: 14px 16px 8px; }
  .post .head .avatar { width: 44px; height: 44px; font-size: 15px; }
  .post .head .meta { flex: 1; min-width: 0; }
  .post .head .meta b { font-size: 14px; }
  .post .head .meta small { color: var(--muted); display: block; font-size: 12.5px; }
  .post .head .time { color: var(--faint); font-size: 12px; }
  .post .body { padding: 2px 16px 12px; white-space: pre-wrap; line-height: 1.5; }
  .post .likebar { padding: 4px 16px 6px; color: var(--faint); font-size: 12.5px; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid var(--line); }
  .post .likebar .heart { width: 16px; height: 16px; border-radius: 50%; background: var(--brand); display: grid; place-items: center; }
  .post .likebar .heart svg { width: 10px; height: 10px; fill: #fff; }
  .post .acts { display: flex; padding: 4px; }
  .actbtn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    background: transparent; border: none; color: var(--muted); font-weight: 600;
    padding: 9px; border-radius: 8px;
  }
  .actbtn:hover { background: var(--hover); }
  .actbtn svg { width: 18px; height: 18px; fill: currentColor; }
  .actbtn.on { color: var(--brand); }

  /* ---- jobs ---- */
  .jobs-filter { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
  .jobs-filter label { color: var(--muted); font-size: 12.5px; white-space: nowrap; }
  select {
    flex: 1; font: inherit; padding: 7px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
  }
  .job { display: flex; gap: 12px; padding: 12px 16px; }
  .job + .job { border-top: 1px solid var(--line); }
  .job .clogo {
    flex: none; width: 44px; height: 44px; border-radius: 8px;
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 16px;
  }
  .job .jmeta { min-width: 0; flex: 1; }
  .job .jtitle { font-weight: 600; color: var(--brand); }
  .job .jcompany { font-size: 13px; }
  .job .jloc { color: var(--muted); font-size: 12.5px; }
  .job .jdesc { color: var(--muted); font-size: 12.5px; margin-top: 5px; line-height: 1.45; }

  .empty { padding: 26px 16px; text-align: center; color: var(--muted); font-size: 13px; }
  .hint { color: var(--muted); font-size: 11.5px; padding: 10px 16px; border-top: 1px solid var(--line); background: var(--bg); }
  .hint code { background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 11px; }

  /* ---- banner + error ---- */
  #banner {
    max-width: 1128px; margin: 14px auto 0; padding: 0 16px;
  }
  #banner .inner {
    background: #fff4e5; border: 1px solid #f0c987; color: #6b4e16;
    border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.5;
  }
  @media (prefers-color-scheme: dark) {
    #banner .inner { background: #3a2f17; border-color: #6b521f; color: #f0d79a; }
  }
  #banner code { background: rgba(0,0,0,.08); padding: 1px 6px; border-radius: 4px; }
  #err {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: #b00020; color: #fff; padding: 9px 16px; border-radius: 999px;
    font-size: 13px; box-shadow: 0 6px 24px rgba(0,0,0,.25); z-index: 50;
    max-width: 92vw; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  #err.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <div class="hdr">
      <div class="logo" aria-label="Linkup" title="Linkup">
        <!-- Original Linkup mark: two nodes "linking up" along a rising connector -->
        <svg viewBox="0 0 24 24" width="21" height="21" fill="none" aria-hidden="true">
          <path d="M7.4 16.6 16.6 7.4" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
          <circle cx="6" cy="18" r="2.7" fill="#fff"/>
          <circle cx="18" cy="6" r="3.1" fill="#fff"/>
        </svg>
      </div>
      <h1>MorphDB <span>· Linkup</span></h1>
      <div class="spacer"></div>
      <div class="me-chip" id="meChip" hidden>
        <span class="avatar" id="meChipAv"></span>
        <span><b id="meChipName"></b><small>You</small></span>
      </div>
    </div>
  </header>

  <div id="banner" hidden></div>

  <main>
    <!-- LEFT -->
    <div class="col col-left">
      <section class="card profile" id="profileCard">
        <div class="banner-strip"></div>
        <div class="pad"><div class="empty">Loading profile…</div></div>
      </section>

      <section class="card">
        <h2>My network <span class="count" id="connCount">0</span></h2>
        <div id="connList"></div>
      </section>

      <section class="card">
        <h2>People you may know</h2>
        <div id="pymkList"></div>
      </section>
    </div>

    <!-- CENTER -->
    <div class="col">
      <section class="card">
        <div class="pad composer">
          <span class="avatar" id="composerAv"></span>
          <div class="grow">
            <textarea id="postBody" placeholder="Share an update with your network…"></textarea>
            <div class="actions">
              <button class="btn solid" id="postBtn">Post</button>
            </div>
          </div>
        </div>
      </section>
      <div class="feed" id="feed"></div>
    </div>

    <!-- RIGHT -->
    <div class="col col-right">
      <section class="card sticky">
        <h2>Jobs<span class="count" id="jobCount">0</span></h2>
        <div class="jobs-filter">
          <label for="jobLoc">Location</label>
          <select id="jobLoc"><option value="">All locations</option></select>
        </div>
        <div id="jobList"></div>
        <div class="hint">Filtered server-side on the <code>location</code> index.</div>
      </section>
    </div>
  </main>

  <div id="err"></div>

<script>
const BASE = location.hostname
  ? `${location.protocol}//${location.hostname}:8787`
  : "http://127.0.0.1:8787";
const APP = "linkedin-demo";          // this site's MorphDB app key (X-App-Key)
const ME_NAME = "Alex Rivera";        // the one designated person who is "you"

const $ = (id) => document.getElementById(id);
let errTimer;
function err(m) {
  const e = $("err");
  if (!m) { e.classList.remove("show"); return; }
  e.textContent = m;
  e.classList.add("show");
  clearTimeout(errTimer);
  errTimer = setTimeout(() => e.classList.remove("show"), 5200);
}

async function api(method, path, body) {
  const res = await fetch(BASE + path, {
    method,
    headers: { "Content-Type": "application/json", "X-App-Key": APP },
    body: body === undefined ? undefined : JSON.stringify(body),
  });
  const data = res.status === 204 ? null : await res.json().catch(() => null);
  if (!res.ok) {
    const msg = data?.error?.message || `HTTP ${res.status}`;
    if (/unknown app|app .*not found|no such app/i.test(msg)) showAppBanner();
    throw new Error(msg);
  }
  return data;
}

function showAppBanner() {
  const b = $("banner");
  b.hidden = false;
  b.innerHTML = `<div class="inner"><b>Backend not set up yet.</b>
    Run <code>morphdb init ${location.pathname.replace(/[^/]*$/, "")}morphdb.schema.json</code>
    (or serve this folder over http) to stand up the <code>${APP}</code> app, then reload.</div>`;
}

/* ---------- self-bootstrap (in-browser `morphdb init`) ---------- */
async function ensureApp() {
  try {
    await fetch(BASE + "/app", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key: APP }),
    });                       // 409 (already registered) is expected & ignored
  } catch (_) { /* surfaced on the first real call */ }
}

async function applySchemaFromFile() {
  let schema;
  try {
    const r = await fetch("./morphdb.schema.json");
    if (!r.ok) throw 0;
    schema = await r.json();
  } catch (_) {
    return;   // opened via file:// or file missing — assume `morphdb init` already ran
  }
  const types = schema.types || [];
  for (const t of types)             // pass 1: every type's fields
    await api("PUT", `/schema/${t.name}`, { merge: true, fields: t.fields || {} });
  for (const t of types)             // pass 2: relations (targets now exist)
    if (t.relations && Object.keys(t.relations).length)
      await api("PUT", `/schema/${t.name}`, { merge: true, relations: t.relations });
}

/* ---------- helpers ---------- */
const COLORS = ["#0a66c2","#7a3e9d","#b24020","#1a7d5a","#9a6a00","#c0367a","#2f6f8f","#5a4fcf"];
function hue(str) { let h = 0; for (const c of str) h = (h * 31 + c.charCodeAt(0)) >>> 0; return COLORS[h % COLORS.length]; }
function initials(name) {
  const p = (name || "?").trim().split(/\s+/);
  return ((p[0]?.[0] || "") + (p[1]?.[0] || "")).toUpperCase() || "?";
}
function avatar(name, cls = "") {
  const s = document.createElement("span");
  s.className = "avatar " + cls;
  s.style.background = hue(name || "?");
  s.textContent = initials(name);
  return s;
}
function ago(iso) {
  const d = (Date.now() - new Date(iso).getTime()) / 1000;
  if (d < 60) return "now";
  if (d < 3600) return Math.floor(d / 60) + "m";
  if (d < 86400) return Math.floor(d / 3600) + "h";
  if (d < 604800) return Math.floor(d / 86400) + "d";
  return Math.floor(d / 604800) + "w";
}
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

const HEART = '<svg viewBox="0 0 16 16"><path d="M8 14s6-3.7 6-8a3.2 3.2 0 0 0-6-1.4A3.2 3.2 0 0 0 2 6c0 4.3 6 8 6 8z"/></svg>';
const THUMB = '<svg viewBox="0 0 24 24"><path d="M2 9h4v12H2zM22 11a2 2 0 0 0-2-2h-5.6l.9-4.3a1.6 1.6 0 0 0-3-1L8 9v12h10.3a2 2 0 0 0 2-1.6l1.6-7A2 2 0 0 0 22 11z"/></svg>';
const COMMENT = '<svg viewBox="0 0 24 24"><path d="M21 6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h3v4l5-4h6a2 2 0 0 0 2-2z"/></svg>';
const SEND = '<svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg>';

/* ---------- state ---------- */
let ME = null;          // hydrated person (include=connections,posts)
let PEOPLE = [];        // all people (flat)
const LIKED_KEY = "linkedin-demo:liked";
let liked = new Set(JSON.parse(localStorage.getItem(LIKED_KEY) || "[]"));
function persistLiked() { localStorage.setItem(LIKED_KEY, JSON.stringify([...liked])); }

/* ---------- loaders / renderers ---------- */
async function loadPeople() {
  const { objects } = await api("GET", "/objects/person?sort=name&order=asc&limit=100");
  PEOPLE = objects;
}

async function loadMe() {
  const q = `/objects/person?name__eq=${encodeURIComponent(ME_NAME)}&include=connections,posts&limit=1`;
  const { objects } = await api("GET", q);
  ME = objects[0] || null;
  renderProfile();
  renderConnections();
  renderPYMK();
}

function renderProfile() {
  const card = $("profileCard");
  if (!ME) { card.querySelector(".pad").innerHTML = '<div class="empty">No profile found.</div>'; return; }
  const conns = ME.connections || [];
  const posts = ME.posts || [];
  card.innerHTML = `<div class="banner-strip"></div><div class="pad"></div>`;
  const pad = card.querySelector(".pad");
  pad.appendChild(avatar(ME.name));
  pad.appendChild(el("div", "pname", ME.name));
  pad.appendChild(el("div", "phead", ME.headline || ""));
  pad.appendChild(el("div", "ploc", ME.location || ""));
  if (ME.about) pad.appendChild(el("div", "about", ME.about));
  pad.appendChild(el("div", "stats",
    `<div><b>${conns.length}</b><span>connections</span></div>
     <div><b>${posts.length}</b><span>posts</span></div>`));

  // header chip
  $("meChip").hidden = false;
  $("meChipName").textContent = ME.name;
  const ca = $("meChipAv"); ca.style.background = hue(ME.name); ca.textContent = initials(ME.name);
  const co = $("composerAv"); co.style.background = hue(ME.name); co.textContent = initials(ME.name);
}

function personRow(p, action) {
  const row = el("div", "prow");
  row.appendChild(avatar(p.name));
  const meta = el("div", "meta", `<b></b><small></small>`);
  meta.querySelector("b").textContent = p.name;
  meta.querySelector("small").textContent = p.headline || p.location || "";
  row.appendChild(meta);
  if (action) row.appendChild(action);
  return row;
}

function renderConnections() {
  const list = $("connList");
  const conns = (ME?.connections || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  $("connCount").textContent = conns.length;
  list.innerHTML = "";
  if (!conns.length) { list.appendChild(el("div", "empty", "No connections yet.")); return; }
  for (const p of conns) {
    const btn = el("button", "btn ghost", "Connected");
    btn.onclick = () => toggleConnect(p._guid, btn);
    list.appendChild(personRow(p, btn));
  }
}

function renderPYMK() {
  const list = $("pymkList");
  list.innerHTML = "";
  if (!ME) return;
  const connected = new Set((ME.connections || []).map((c) => c._guid));
  const suggestions = PEOPLE.filter((p) => p._guid !== ME._guid && !connected.has(p._guid));
  if (!suggestions.length) { list.appendChild(el("div", "empty", "You know everyone here 🎉")); return; }
  for (const p of suggestions) {
    const btn = el("button", "btn", "+ Connect");
    btn.onclick = () => toggleConnect(p._guid, btn);
    list.appendChild(personRow(p, btn));
  }
}

async function toggleConnect(guid, btn) {
  if (!ME) return;
  if (btn) { btn.disabled = true; btn.textContent = "…"; }
  const cur = (ME.connections || []).map((c) => c._guid);
  const on = cur.includes(guid);
  const next = on ? cur.filter((g) => g !== guid) : [...cur, guid];
  try {
    await api("PATCH", `/objects/person/${ME._guid}`, { connections: next });
    await loadMe();        // symmetric link reflects on both sides — re-read hydrated
    loadFeed();            // (author headlines unaffected, but keeps things fresh)
  } catch (e) { err(e.message); if (btn) btn.disabled = false; }
}

async function loadFeed() {
  const { objects } = await api("GET", "/objects/post?sort=created&order=desc&include=author&limit=50");
  renderFeed(objects);
}

function renderFeed(posts) {
  const feed = $("feed");
  feed.innerHTML = "";
  if (!posts.length) {
    feed.appendChild(el("div", "card empty", "No posts yet. Share the first update above."));
    return;
  }
  for (const post of posts) {
    const a = post.author || { name: "Unknown" };
    const isOn = liked.has(post._guid);
    const card = el("div", "card post");

    const head = el("div", "head");
    head.appendChild(avatar(a.name));
    const meta = el("div", "meta", "<b></b><small></small>");
    meta.querySelector("b").textContent = a.name;
    meta.querySelector("small").textContent = a.headline || "";
    head.appendChild(meta);
    head.appendChild(el("div", "time", ago(post.created)));
    card.appendChild(head);

    const body = el("div", "body");
    body.textContent = post.body;
    card.appendChild(body);

    if ((post.likes || 0) > 0) {
      card.appendChild(el("div", "likebar",
        `<span class="heart">${HEART}</span> ${post.likes}`));
    }

    const acts = el("div", "acts");
    const like = el("button", "actbtn" + (isOn ? " on" : ""), `${THUMB}<span>Like</span>`);
    like.onclick = () => toggleLike(post);
    const cmt = el("button", "actbtn", `${COMMENT}<span>Comment</span>`);
    cmt.onclick = () => err("Comments aren't part of this demo's schema — yet.");
    const snd = el("button", "actbtn", `${SEND}<span>Send</span>`);
    snd.onclick = () => err("Sharing isn't wired up in this demo.");
    acts.append(like, cmt, snd);
    card.appendChild(acts);

    feed.appendChild(card);
  }
}

async function toggleLike(post) {
  const on = liked.has(post._guid);
  const next = Math.max(0, (post.likes || 0) + (on ? -1 : 1));
  try {
    await api("PATCH", `/objects/post/${post._guid}`, { likes: next });
    if (on) liked.delete(post._guid); else liked.add(post._guid);
    persistLiked();
    loadFeed();
  } catch (e) { err(e.message); }
}

async function publishPost() {
  const ta = $("postBody");
  const body = ta.value.trim();
  if (!body || !ME) return;
  $("postBtn").disabled = true;
  try {
    await api("POST", "/objects/post", {
      body, likes: 0, created: new Date().toISOString(), author: ME._guid,
    });
    ta.value = "";
    await loadFeed();
    await loadMe();   // bump my post count
  } catch (e) { err(e.message); }
  $("postBtn").disabled = false;
}

async function loadJobLocations() {
  const { objects } = await api("GET", "/objects/job?limit=100");
  const locs = [...new Set(objects.map((j) => j.location).filter(Boolean))].sort();
  const sel = $("jobLoc");
  sel.innerHTML = '<option value="">All locations</option>';
  for (const l of locs) {
    const o = document.createElement("option");
    o.value = l; o.textContent = l;
    sel.appendChild(o);
  }
}

async function loadJobs(loc) {
  let q = "/objects/job?sort=company&order=asc&limit=100";
  if (loc) q += `&location__eq=${encodeURIComponent(loc)}`;   // indexed field → server filter
  const { objects, total } = await api("GET", q);
  $("jobCount").textContent = total;
  const list = $("jobList");
  list.innerHTML = "";
  if (!objects.length) { list.appendChild(el("div", "empty", "No jobs in this location.")); return; }
  for (const j of objects) {
    const job = el("div", "job");
    const logo = el("div", "clogo", initials(j.company));
    logo.style.background = hue(j.company);
    job.appendChild(logo);
    const m = el("div", "jmeta");
    const t = el("div", "jtitle"); t.textContent = j.title; m.appendChild(t);
    const c = el("div", "jcompany"); c.textContent = j.company; m.appendChild(c);
    const lo = el("div", "jloc"); lo.textContent = j.location; m.appendChild(lo);
    if (j.description) { const d = el("div", "jdesc"); d.textContent = j.description; m.appendChild(d); }
    job.appendChild(m);
    list.appendChild(job);
  }
}

/* ---------- seed (only when empty, idempotent) ---------- */

  const probe = await api("GET", "/objects/person?limit=1");
  if (probe.total > 0) return;

  const people = [
    { name: "Alex Rivera",     headline: "Senior Product Designer at Lumen",        location: "San Francisco, CA", about: "Designing calm, human software. Ex-agency. I sketch before I Figma." },
    { name: "Priya Nair",      headline: "Engineering Manager at Northwind",        location: "Seattle, WA",       about: "Building reliable platforms and the teams behind them." },
    { name: "Marcus Chen",     headline: "Founder & CEO at Stacktide",              location: "San Francisco, CA", about: "2x founder. We turn infra pain into developer joy." },
    { name: "Dana Whitfield",  headline: "Data Scientist at Orbital Health",        location: "New York, NY",      about: "ML for healthcare. Cautiously optimistic about everything." },
    { name: "Sofia Almeida",   headline: "UX Researcher at Lumen",                  location: "Austin, TX",        about: "I find the questions your roadmap forgot to ask." },
  ];
  const id = {};
  for (const p of people) id[p.name] = (await api("POST", "/objects/person", p))._guid;

  // Undirected web of connections. Each person gets their COMPLETE adjacency, so
  // the symmetric writes are order-independent. Alex is NOT linked to Dana — she
  // shows up under "People you may know".
  const adj = {
    "Alex Rivera":    ["Priya Nair", "Marcus Chen", "Sofia Almeida"],
    "Priya Nair":     ["Alex Rivera", "Dana Whitfield"],
    "Marcus Chen":    ["Alex Rivera", "Dana Whitfield", "Sofia Almeida"],
    "Sofia Almeida":  ["Alex Rivera", "Marcus Chen"],
    "Dana Whitfield": ["Priya Nair", "Marcus Chen"],
  };
  for (const [name, friends] of Object.entries(adj))
    await api("PATCH", `/objects/person/${id[name]}`, { connections: friends.map((n) => id[n]) });

  const iso = (h) => new Date(Date.now() - h * 3600 * 1000).toISOString();
  const posts = [
    { author: "Marcus Chen",    likes: 142, h: 3,  body: "We just shipped Stacktide 2.0 🚀\n\nOne-click rollbacks, 40% faster cold starts, and a free tier that's actually usable. Three years of work. Proud of this team." },
    { author: "Sofia Almeida",  likes: 64,  h: 9,  body: "Ran 12 usability sessions this week. The #1 lesson, again: people don't read, they scan. If your empty state needs a paragraph, your empty state is the bug." },
    { author: "Priya Nair",     likes: 38,  h: 26, body: "Hot take: code review is a teaching tool first and a gate second. If your reviews only ever say 'LGTM' or 'change this', you're leaving the best part on the table." },
    { author: "Alex Rivera",    likes: 91,  h: 30, body: "Redesigned our onboarding and cut it from 7 steps to 3. Activation is up 22%. The trick was deleting features from the flow, not adding hand-holding." },
    { author: "Dana Whitfield", likes: 27,  h: 52, body: "Spent the weekend reproducing a paper from scratch. Half the gains vanished once I controlled for data leakage. Read the methods section, friends." },
  ];
  for (const p of posts)
    await api("POST", "/objects/post", { body: p.body, likes: p.likes, created: iso(p.h), author: id[p.author] });

  const jobs = [
    { title: "Staff Product Designer",   company: "Lumen",         location: "San Francisco, CA", description: "Lead design for our core workspace. Systems thinker who still loves the pixels." },
    { title: "Senior Frontend Engineer", company: "Northwind",     location: "Seattle, WA",       description: "TypeScript + React. Own the dashboard end-to-end. Performance obsessives encouraged." },
    { title: "Product Manager, Growth",  company: "Stacktide",     location: "Remote",            description: "Run experiments across activation and onboarding. SQL fluency required." },
    { title: "Machine Learning Engineer",company: "Orbital Health",location: "New York, NY",      description: "Ship models to production for clinical decision support. Healthcare experience a plus." },
    { title: "UX Researcher",            company: "Lumen",         location: "Austin, TX",        description: "Mixed-methods research embedded with product squads. Drive the roadmap with evidence." },
    { title: "Backend Engineer",         company: "Northwind",     location: "Seattle, WA",       description: "Go + Postgres. Build the APIs that power everything. On-call is humane here." },
    { title: "Founding Designer",        company: "Stacktide",     location: "Remote",            description: "Define the brand and the product surface from zero. Early equity, big canvas." },
  ];
  for (const j of jobs) await api("POST", "/objects/job", j);
}

/* ---------- wire up ---------- */
$("postBtn").onclick = publishPost;
$("postBody").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") publishPost();
});
$("jobLoc").onchange = (e) => loadJobs(e.target.value).catch((x) => err(x.message));

(async () => {
  try {
    await ensureApp();
    await applySchemaFromFile();
  } catch (e) {
    err("Could not reach MorphDB at " + BASE + " — is it running? (" + e.message + ")");
    return;
  }
  try {
    await seedIfEmpty();
    await loadPeople();
    await loadMe();
    await loadFeed();
    await loadJobLocations();
    await loadJobs("");
  } catch (e) { err(e.message); }
})();
</script>
