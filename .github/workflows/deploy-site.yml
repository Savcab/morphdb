name: deploy-site

# Auto-deploy the explainer (site/) to Cloudflare Pages -> https://morphdb.pages.dev
# on every push to main that touches it. One-time setup: add a repo secret
# CLOUDFLARE_API_TOKEN (Cloudflare dashboard -> My Profile -> API Tokens ->
# create one with Account · Cloudflare Pages · Edit). The account ID below is
# not a secret. Until the token is set, runs succeed with a warning (no deploy).
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Note if token missing
        if: ${{ env.CF_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN secret not set — skipping deploy. Add it in repo Settings → Secrets → Actions."

      - uses: actions/checkout@v5
        if: ${{ env.CF_TOKEN != '' }}

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_TOKEN }}
          accountId: 87fdea2adeb47f6473fb999e5ae78cea
          command: pages deploy site --project-name=morphdb --branch=main
